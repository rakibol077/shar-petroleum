<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shar Petroleum - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
        <img src="https://arpetrolna.comtechsolutionbd.com/assets/images/logo.png" alt="Logo" class="mx-auto mb-4 w-32">
        
        <h2 class="text-xl font-bold text-gray-700 mb-6">Admin Login</h2>

        <form onsubmit="event.preventDefault(); loginCheck()">
            <div class="text-left mb-4">
                <label class="text-xs font-bold text-gray-500">GMAIL</label>
                <input type="email" id="email" class="w-full p-3 border rounded mt-1" value="rakibol077@gmail.com" readonly>
            </div>
            <div class="text-left mb-6">
                <label class="text-xs font-bold text-gray-500">PASSWORD</label>
                <input type="password" id="password" class="w-full p-3 border rounded mt-1" placeholder="adminshar" required>
            </div>
            <button class="w-full bg-[#00adef] text-white font-bold py-3 rounded shadow-lg">LOGIN</button>
        </form>
    </div>

    <script>
        function loginCheck() {
            const p = document.getElementById('password').value;
            if(p === "adminshar") {
                window.location.href = "dashboard.html";
            } else {
                alert("ভুল পাসওয়ার্ড!");
            }
        }
    </script>
</body>
</html>
