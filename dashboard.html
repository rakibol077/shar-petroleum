<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shar Petroleum - Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        /* Premium Card Styles */
        .glass-card { 
            background: white; 
            border-radius: 30px; 
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.04);
            border: 1px solid rgba(226, 232, 240, 0.5);
        }

        .sidebar-btn-active {
            background: #2563eb;
            color: white;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
        }

        /* Table Style */
        th { color: #94a3b8; font-size: 11px; letter-spacing: 0.05em; padding: 24px; }
        td { padding: 20px 24px; font-weight: 600; color: #334155; border-bottom: 1px solid #f1f5f9; }
        
        /* Modal Style */
        #entryModal { display: none; }
        #entryModal.active { display: flex; }

        .btn-premium {
            transition: all 0.3s ease;
        }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 bg-white border-r border-slate-100 flex flex-col p-6 fixed h-full">
        <div class="flex items-center gap-3 mb-12 px-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-droplet"></i>
            </div>
            <div>
                <h1 class="text-sm font-extrabold text-blue-900 uppercase leading-none">Shar Petroleum</h1>
                <p class="text-[10px] text-blue-400 font-bold italic">ADMIN ACCOUNT</p>
            </div>
        </div>

        <nav class="flex-1 space-y-2">
            <button class="w-full flex items-center gap-4 px-5 py-4 sidebar-btn-active rounded-2xl font-bold text-xs uppercase transition">
                <i class="fas fa-chart-pie text-lg"></i> Analytics Dashboard
            </button>
        </nav>

        <button onclick="logout()" class="w-full py-4 bg-white border border-slate-100 text-red-500 rounded-2xl font-bold text-xs uppercase flex items-center justify-center gap-2 hover:bg-red-50 transition mt-auto">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </aside>

    <main class="flex-1 ml-72 p-10">
        
        <div class="flex justify-between items-center mb-10">
            <div class="relative w-96">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                <input type="text" placeholder="Search Station..." class="w-full pl-14 pr-6 py-4 bg-white rounded-full border-none outline-none text-xs font-semibold shadow-sm italic">
            </div>
            <div class="flex gap-3">
                <button class="px-8 py-3 bg-[#00a36c] text-white rounded-full font-bold text-[10px] uppercase btn-premium">Excel</button>
                <button class="px-8 py-3 bg-[#1e293b] text-white rounded-full font-bold text-[10px] uppercase btn-premium">Print</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
            <div class="glass-card p-8 text-left">
                <p class="text-[10px] font-extrabold text-slate-400 uppercase mb-2">Gross Sales</p>
                <h2 id="totalGross" class="text-2xl font-black text-blue-900">0 SR</h2>
            </div>
            <div class="glass-card p-8 text-left">
                <p class="text-[10px] font-extrabold text-red-400 uppercase mb-2">VAT (15%)</p>
                <h2 id="totalTax" class="text-2xl font-black text-red-500">0 SR</h2>
            </div>
            <div class="glass-card p-8 text-left">
                <p class="text-[10px] font-extrabold text-green-500 uppercase mb-2">Net Profit</p>
                <h2 id="totalNet" class="text-2xl font-black text-slate-900">0 SR</h2>
            </div>
            <div class="glass-card p-8 text-left">
                <p class="text-[10px] font-extrabold text-orange-400 uppercase mb-2">Month's Tax</p>
                <h2 class="text-2xl font-black text-orange-500">1,000 SR</h2>
            </div>
        </div>

        <div class="flex justify-between items-end mb-6 px-2">
            <h3 class="text-2xl font-black text-slate-800 italic uppercase tracking-tighter">Transaction Records</h3>
            <button onclick="openModal()" class="px-10 py-5 bg-[#1e3a8a] text-white rounded-[25px] font-bold text-xs uppercase shadow-xl btn-premium flex items-center gap-3">
                <i class="fas fa-plus-circle text-lg"></i> Add Entry
            </button>
        </div>

        <div class="glass-card overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50/50 uppercase">
                    <tr>
                        <th>Date</th>
                        <th>Station</th>
                        <th class="text-slate-400">Visa</th>
                        <th class="text-orange-300">Master</th>
                        <th class="text-blue-600">Mada</th>
                        <th class="text-red-400">VAT (-15%)</th>
                        <th class="text-slate-900 font-black">Net Total</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </main>

    <div id="entryModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white p-10 rounded-[40px] w-full max-w-md shadow-2xl scale-in">
            <h2 class="text-xl font-black mb-6 uppercase italic">New Card Entry</h2>
            <form id="dataForm" class="space-y-4">
                <input type="date" id="formDate" required class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm">
                <input type="text" id="formStation" placeholder="Station Name" required class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm uppercase">
                <div class="grid grid-cols-3 gap-3">
                    <input type="number" step="any" id="formMada" placeholder="Mada" class="p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm">
                    <input type="number" step="any" id="formVisa" placeholder="Visa" class="p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm">
                    <input type="number" step="any" id="formMaster" placeholder="Master" class="p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm">
                </div>
                <div class="flex gap-4 mt-6">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold uppercase text-xs">Cancel</button>
                    <button type="submit" id="saveBtn" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold uppercase text-xs shadow-lg">Save Data</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // আপনার নতুন স্ক্রিপ্ট URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyavr8WP8RHnSuH9kMtySIePFjx2Ks0f-WlfnZrQQXGBV6ovxgn9L12OI3LnmbWRSfh/exec";

        function openModal() { document.getElementById('entryModal').classList.add('active'); }
        function closeModal() { document.getElementById('entryModal').classList.remove('active'); document.getElementById('dataForm').reset(); }

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                renderTable(data);
            } catch(e) { console.error("Load failed"); }
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            let gTotal=0, tVat=0, tNet=0;

            data.slice().reverse().forEach((row, index) => {
                const actualIndex = data.length - 1 - index;
                const m = parseFloat(row.mada) || 0;
                const v = parseFloat(row.visa) || 0;
                const ms = parseFloat(row.master) || 0;
                
                const gross = m + v + ms;
                const net = gross / 1.15;
                const vat = gross - net;
                
                gTotal += gross; tVat += vat; tNet += net;

                body.innerHTML += `
                    <tr>
                        <td class="text-slate-400 text-xs">${new Date(row.date).toLocaleDateString()}</td>
                        <td class="text-blue-900 font-black uppercase text-xs tracking-tighter">${row.stationName}</td>
                        <td class="text-slate-400 font-medium">${v.toFixed(2)}</td>
                        <td class="text-orange-300 font-medium">${ms.toFixed(2)}</td>
                        <td class="text-blue-600 font-black">${m.toFixed(2)}</td>
                        <td class="text-red-400 font-bold">-${vat.toFixed(2)}</td>
                        <td class="font-black text-slate-900">${net.toFixed(2)}</td>
                        <td class="text-center">
                            <div class="flex justify-center gap-3">
                                <button class="text-blue-400 hover:text-blue-600"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteRow(${actualIndex})" class="text-red-200 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </td>
                    </tr>`;
            });

            document.getElementById('totalGross').innerText = gTotal.toLocaleString(undefined, {minimumFractionDigits: 0}) + " SR";
            document.getElementById('totalTax').innerText = tVat.toLocaleString(undefined, {minimumFractionDigits: 0}) + " SR";
            document.getElementById('totalNet').innerText = tNet.toLocaleString(undefined, {minimumFractionDigits: 0}) + " SR";
        }

        document.getElementById('dataForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Saving..."; btn.disabled = true;

            const payload = {
                date: document.getElementById('formDate').value,
                stationName: document.getElementById('formStation').value,
                mada: document.getElementById('formMada').value || 0,
                visa: document.getElementById('formVisa').value || 0,
                master: document.getElementById('formMaster').value || 0,
                action: "add"
            };

            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            
            setTimeout(() => {
                closeModal();
                loadData();
                btn.innerText = "Save Data"; btn.disabled = false;
            }, 1500);
        };

        async function deleteRow(idx) {
            if(!confirm("Delete this entry?")) return;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ index: idx, action: "delete" }) });
            setTimeout(loadData, 1000);
        }

        window.onload = loadData;
        function logout() { window.location.href = "index.html"; }
    </script>
</body>
</html>
