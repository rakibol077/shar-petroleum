<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shar Petroleum - Management Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        .premium-card { box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.05); border-radius: 40px; }
        
        /* Dark Mode */
        body.dark { background-color: #0b0f19; color: #f8fafc; }
        .dark .bg-white { background-color: #161d2f !important; color: white; border-color: #1e293b; }
        .dark .text-slate-900, .dark .text-blue-900 { color: #f8fafc; }
        .dark .bg-slate-50 { background-color: #1e293b !important; }
        .dark input { background-color: #1e293b !important; color: white; border: 1px solid #334155 !important; }

        /* Modal Visibility */
        #entryModal { display: none; }
        #entryModal.active { display: flex; }
    </style>
</head>
<body class="bg-[#f4f7fe] flex min-h-screen">

    <aside class="w-80 bg-white border-r border-slate-50 flex flex-col p-8 no-print">
        <div class="flex items-center gap-4 mb-12">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg text-white">
                <i class="fas fa-droplet text-xl"></i>
            </div>
            <div>
                <h1 class="text-sm font-extrabold uppercase text-blue-900 tracking-tighter">Shar Petroleum</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase italic">Admin Panel</p>
            </div>
        </div>
        <nav class="flex-1 space-y-4">
            <button class="w-full flex items-center gap-4 px-6 py-5 bg-blue-600 text-white rounded-[25px] font-bold text-sm shadow-xl">
                <i class="fas fa-chart-line"></i> DASHBOARD
            </button>
            <button onclick="toggleDarkMode()" class="w-full flex items-center gap-4 px-6 py-5 text-slate-500 hover:bg-slate-50 rounded-[25px] font-bold text-sm transition">
                <i id="modeIcon" class="fas fa-moon text-blue-500"></i> <span id="modeText">NIGHT MODE</span>
            </button>
        </nav>
        <button onclick="logout()" class="w-full py-5 bg-slate-50 text-red-500 rounded-[25px] font-extrabold text-[11px] uppercase tracking-widest hover:bg-red-50 transition">
            <i class="fas fa-power-off mr-2"></i> LOGOUT
        </button>
    </aside>

    <main class="flex-1 p-12 overflow-y-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="relative w-full md:w-80 bg-white premium-card flex items-center px-6 py-1">
                <i class="fas fa-search text-slate-300"></i>
                <input type="text" id="searchInput" onkeyup="searchStation()" placeholder="Search Station..." class="w-full bg-transparent border-none text-xs font-bold outline-none p-4">
            </div>
            <div class="flex items-center gap-4 bg-white p-2 px-6 rounded-[25px] premium-card">
                <input type="date" id="startDate" class="bg-transparent border-none text-xs font-bold outline-none p-2 text-slate-500">
                <span class="text-slate-300 font-bold">to</span>
                <input type="date" id="endDate" class="bg-transparent border-none text-xs font-bold outline-none p-2 text-slate-500">
                <button onclick="applyFilter()" class="bg-blue-600 text-white px-6 py-2 rounded-2xl font-bold text-[10px] uppercase shadow-lg">Filter</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
            <div class="bg-white p-10 premium-card text-center">
                <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-2">Gross Sales</p>
                <h2 id="totalGross" class="text-3xl font-extrabold text-slate-900">0 SR</h2>
            </div>
            <div class="bg-white p-10 premium-card text-center">
                <p class="text-[10px] font-extrabold text-red-400 uppercase tracking-widest mb-2">VAT (15%)</p>
                <h2 id="totalTax" class="text-3xl font-extrabold text-red-500">0 SR</h2>
            </div>
            <div class="bg-white p-10 premium-card text-center">
                <p class="text-[10px] font-extrabold text-orange-400 uppercase tracking-widest mb-2">Target</p>
                <h2 class="text-3xl font-extrabold text-orange-600">5,000 SR</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <div class="bg-white p-8 premium-card"><canvas id="salesChart" height="150"></canvas></div>
            <div class="bg-white p-8 premium-card"><canvas id="taxChart" height="150"></canvas></div>
        </div>

        <div class="flex justify-between items-center mb-10">
            <h3 class="text-xl font-extrabold text-slate-900 italic uppercase">Records</h3>
            <button onclick="openModal()" class="bg-blue-900 text-white px-10 py-5 rounded-[25px] font-bold text-xs uppercase shadow-2xl hover:scale-105 transition">
                <i class="fas fa-plus mr-2"></i> Add Entry
            </button>
        </div>

        <div class="bg-white premium-card overflow-hidden">
            <table class="w-full text-left" id="dataTable">
                <thead class="bg-slate-50/50 text-slate-400 font-extrabold uppercase text-[10px]">
                    <tr>
                        <th class="p-8">Date</th>
                        <th class="p-8">Station</th>
                        <th class="p-8 text-blue-600">Mada</th>
                        <th class="p-8 text-red-500">VAT</th>
                        <th class="p-8 text-slate-900">Total</th>
                        <th class="p-8 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-50"></tbody>
            </table>
        </div>
    </main>

    <div id="entryModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white p-10 rounded-[40px] w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-black mb-6 uppercase">Add/Edit Data</h2>
            <form id="dataForm" class="space-y-4">
                <input type="hidden" id="editRowId">
                <input type="date" id="formDate" required class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold">
                <input type="text" id="formStation" placeholder="Station Name" required class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold">
                <input type="number" step="any" id="formMada" placeholder="Mada Amount" required class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold">
                <input type="number" step="any" id="formVisa" placeholder="Visa Amount (Optional)" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold">
                <div class="flex gap-4 mt-6">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold uppercase text-xs">Cancel</button>
                    <button type="submit" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold uppercase text-xs shadow-lg">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCFX8Ul8xu0CrgiSnRqbBqv1G8hTuo-GhTZqKfB7oe58jhgkXjzE56AGMt_42swBo/exec";
        let rawData = [];
        let salesChart, taxChart;

        function openModal() { document.getElementById('entryModal').classList.add('active'); }
        function closeModal() { 
            document.getElementById('entryModal').classList.remove('active'); 
            document.getElementById('dataForm').reset();
            document.getElementById('editRowId').value = '';
        }

        async function loadData() {
            const res = await fetch(SCRIPT_URL);
            rawData = await res.json();
            renderDashboard(rawData);
        }

        function renderDashboard(data) {
            renderTable(data);
            updateCharts(data);
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            let gTotal=0, tVat=0;

            data.slice().reverse().forEach((row, index) => {
                const total = (parseFloat(row.mada)||0) + (parseFloat(row.visa)||0);
                const vat = total - (total/1.15);
                gTotal += total; tVat += vat;

                body.innerHTML += `
                    <tr class="hover:bg-slate-50/50 transition">
                        <td class="p-8 font-bold text-slate-400">${new Date(row.date).toLocaleDateString()}</td>
                        <td class="p-8 font-black text-blue-900 uppercase italic tracking-tighter">${row.stationName}</td>
                        <td class="p-8 font-black text-blue-600">${(parseFloat(row.mada)||0).toFixed(2)}</td>
                        <td class="p-8 text-red-500 font-bold">-${vat.toFixed(2)}</td>
                        <td class="p-8 font-black text-slate-900">${total.toFixed(2)}</td>
                        <td class="p-8 text-center flex justify-center gap-4">
                            <button onclick="editRow(${data.length - 1 - index})" class="text-blue-500 hover:scale-120 transition"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteRow(${data.length - 1 - index})" class="text-red-300 hover:text-red-600 transition"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
            document.getElementById('totalGross').innerText = gTotal.toLocaleString() + " SR";
            document.getElementById('totalTax').innerText = tVat.toLocaleString() + " SR";
        }

        // এন্ট্রি এবং এডিট ফাংশন
        document.getElementById('dataForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                date: document.getElementById('formDate').value,
                stationName: document.getElementById('formStation').value,
                mada: document.getElementById('formMada').value,
                visa: document.getElementById('formVisa').value || 0,
                rowId: document.getElementById('editRowId').value, // যদি এডিট হয়
                action: document.getElementById('editRowId').value ? "edit" : "add"
            };

            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            closeModal();
            loadData();
        };

        async function deleteRow(index) {
            if(!confirm("Are you sure?")) return;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ index: index, action: "delete" }) });
            loadData();
        }

        function editRow(index) {
            const row = rawData[index];
            document.getElementById('formDate').value = row.date.split('T')[0];
            document.getElementById('formStation').value = row.stationName;
            document.getElementById('formMada').value = row.mada;
            document.getElementById('formVisa').value = row.visa;
            document.getElementById('editRowId').value = index;
            openModal();
        }

        function updateCharts(data) {
            const last7 = data.slice(-7);
            const labels = last7.map(r => new Date(r.date).toLocaleDateString());
            const sales = last7.map(r => (parseFloat(r.mada)||0) + (parseFloat(r.visa)||0));
            
            if(salesChart) salesChart.destroy();
            salesChart = new Chart(document.getElementById('salesChart'), {
                type: 'line', 
                data: { labels, datasets: [{ label: 'Sales', data: sales, borderColor: '#2563eb', tension: 0.4, fill: true, backgroundColor: 'rgba(37,99,235,0.1)' }] },
                options: { plugins: { legend: { display: false } } }
            });
        }

        function toggleDarkMode() { document.body.classList.toggle('dark'); }
        function searchStation() { /* আপনার সার্চ লজিক */ }
        window.onload = loadData;
    </script>
</body>
</html>
