<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shar Petroleum - Advanced Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #dee2e6; }
        .admin-only { display: none; }
        #entryModal { display: none; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .loading-spinner { border: 2px solid #f3f3f3; border-top: 2px solid #3498db; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar flex flex-col h-full shadow-lg z-20">
        <div class="p-6 border-b flex items-center space-x-3">
            <img src="https://arpetrolna.comtechsolutionbd.com/assets/images/logo.png" class="w-10">
            <div>
                <h1 class="text-blue-900 font-black text-xs leading-none uppercase">Shar Petroleum</h1>
                <span class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Database Linked</span>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2 text-sm">
            <div class="bg-blue-600 text-white p-3 flex items-center space-x-3 rounded-lg cursor-pointer shadow-md"><i class="fas fa-home"></i> <span>Dashboard</span></div>
            <p class="text-[10px] font-black text-gray-400 px-3 mt-6 mb-2 uppercase tracking-widest">Reports</p>
            <div class="p-3 hover:bg-gray-100 rounded-lg cursor-pointer flex items-center space-x-3"><i class="fas fa-chart-line"></i> <span>Sales Report</span></div>
            <div class="p-3 hover:bg-gray-100 rounded-lg cursor-pointer flex items-center space-x-3"><i class="fas fa-calculator"></i> <span>VAT Analysis</span></div>
        </nav>
        <div class="p-4 border-t bg-gray-50">
            <button onclick="location.href='index.html'" class="w-full text-left p-3 text-red-600 font-bold flex items-center space-x-3 hover:bg-red-50 rounded-lg"><i class="fas fa-sign-out-alt"></i> <span>Exit</span></button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white h-16 border-b flex items-center justify-between px-8 shadow-sm">
            <div class="text-xs font-bold text-gray-400 uppercase tracking-widest">Management System</div>
            <div class="flex items-center space-x-4">
                <span id="roleLabel" class="text-[9px] bg-blue-100 text-blue-600 px-2 py-1 rounded-full font-bold">...</span>
                <div class="w-8 h-8 bg-blue-900 text-white rounded-full flex items-center justify-center font-bold text-[10px]">RI</div>
            </div>
        </header>

        <div class="p-8 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-xl font-bold text-gray-800 uppercase">Station Master Data</h1>
                    <p class="text-xs text-gray-400 mt-1">Real-time sync with Google Sheets (Visa/Master/Mada included)</p>
                </div>
                <button onclick="toggleModal()" id="addBtn" class="admin-only bg-[#00adef] hover:bg-blue-600 text-white px-6 py-2 rounded-lg font-bold text-xs shadow-xl transition flex items-center space-x-2">
                    <i class="fas fa-plus-circle"></i> <span>ADD NEW ENTRY</span>
                </button>
            </div>

            <div class="bg-white rounded-2xl border border-gray-100 shadow-xl overflow-x-auto">
                <table class="w-full text-left text-xs border-collapse min-w-[800px]">
                    <thead class="bg-gray-50 text-gray-500 font-black uppercase text-[9px] border-b">
                        <tr>
                            <th class="p-4">Date</th>
                            <th class="p-4">Station</th>
                            <th class="p-4">Cash Sales</th>
                            <th class="p-4">Visa</th>
                            <th class="p-4">Master</th>
                            <th class="p-4">Mada</th>
                            <th class="p-4">VAT (15%)</th>
                            <th class="p-4">Total</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50" id="tableBody">
                        <tr><td colspan="8" class="p-10 text-center text-gray-400">Loading data from Google Sheets...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="entryModal" class="fixed inset-0 flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl p-8">
            <h3 class="font-black text-gray-800 uppercase text-sm mb-6">New Station Entry</h3>
            <form onsubmit="event.preventDefault(); addData();">
                <div class="space-y-4">
                    <input type="text" id="sName" placeholder="Station Name" class="w-full p-3 border rounded-xl bg-gray-50 text-sm outline-none focus:border-blue-500" required>
                    <input type="number" id="sAmount" placeholder="Cash Sales Amount" class="w-full p-3 border rounded-xl bg-gray-50 text-sm outline-none focus:border-blue-500" required>
                    <div class="grid grid-cols-3 gap-2">
                        <input type="number" id="sVisa" placeholder="Visa" class="p-3 border rounded-xl bg-gray-50 text-xs outline-none">
                        <input type="number" id="sMaster" placeholder="Master" class="p-3 border rounded-xl bg-gray-50 text-xs outline-none">
                        <input type="number" id="sMada" placeholder="Mada" class="p-3 border rounded-xl bg-gray-50 text-xs outline-none">
                    </div>
                    <button type="submit" id="saveBtn" class="w-full bg-blue-900 text-white font-black py-4 rounded-2xl hover:bg-black transition-all uppercase text-xs">Save Record</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzw8lyzJB0rOcLkcH0V5V3hC08XHe3ASHTKfee9GW9OqzzkF9I_Df2BHe8qqqfZAo-M/exec";

        function toggleModal() {
            const modal = document.getElementById('entryModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                const tableBody = document.getElementById('tableBody');
                tableBody.innerHTML = "";

                data.reverse().forEach(row => {
                    const date = new Date(row.date).toLocaleDateString();
                    tableBody.innerHTML += `
                        <tr class="hover:bg-blue-50/50 transition">
                            <td class="p-4 text-gray-400">${date}</td>
                            <td class="p-4 font-black text-blue-900 uppercase">${row.stationName}</td>
                            <td class="p-4 font-bold">${row.salesAmount.toLocaleString()}</td>
                            <td class="p-4 text-blue-500">${row.visa.toLocaleString()}</td>
                            <td class="p-4 text-orange-500">${row.master.toLocaleString()}</td>
                            <td class="p-4 text-green-500">${row.mada.toLocaleString()}</td>
                            <td class="p-4 text-gray-400">${row.vatAmount.toLocaleString()}</td>
                            <td class="p-4 font-black text-gray-800">${row.totalAmount.toLocaleString()}</td>
                        </tr>`;
                });
            } catch (error) { console.error(error); }
        }

        async function addData() {
            const btn = document.getElementById('saveBtn');
            const amount = parseFloat(document.getElementById('sAmount').value) || 0;
            const visa = parseFloat(document.getElementById('sVisa').value) || 0;
            const master = parseFloat(document.getElementById('sMaster').value) || 0;
            const mada = parseFloat(document.getElementById('sMada').value) || 0;
            
            const vat = amount * 0.15;
            const total = amount + vat;

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> SAVING...';

            const payload = {
                stationName: document.getElementById('sName').value,
                salesAmount: amount,
                visa: visa,
                master: master,
                mada: mada,
                vatAmount: vat,
                totalAmount: total
            };

            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            toggleModal();
            loadData();
            btn.disabled = false;
            btn.innerHTML = 'Save Record';
        }

        function checkRole() {
            const role = localStorage.getItem('userRole');
            if (role === 'admin') {
                document.getElementById('addBtn').style.display = 'flex';
                document.getElementById('roleLabel').innerText = "ADMINISTRATOR";
            } else {
                document.getElementById('roleLabel').innerText = "VIEWER";
            }
        }

        window.onload = () => { checkRole(); loadData(); };
    </script>
</body>
</html>
