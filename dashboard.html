<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shar Petroleum - Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #dee2e6; }
        .admin-only { display: none; }
        #entryModal { display: none; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .loading-spinner { border: 2px solid #f3f3f3; border-top: 2px solid #3498db; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar flex flex-col h-full shadow-lg z-20">
        <div class="p-6 border-b flex items-center space-x-3">
            <img src="https://arpetrolna.comtechsolutionbd.com/assets/images/logo.png" class="w-10">
            <div>
                <h1 class="text-blue-900 font-black text-xs leading-none uppercase">Shar Petroleum</h1>
                <span class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Calculated VAT (1.15)</span>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2 text-sm">
            <div class="bg-blue-600 text-white p-3 flex items-center space-x-3 rounded-lg cursor-pointer shadow-md"><i class="fas fa-home"></i> <span>Dashboard</span></div>
            <p class="text-[10px] font-black text-gray-400 px-3 mt-6 mb-2 uppercase tracking-widest">Operations</p>
            <div class="p-3 hover:bg-gray-100 rounded-lg cursor-pointer flex items-center space-x-3 text-gray-600"><i class="fas fa-calculator"></i> <span>VAT Analysis</span></div>
        </nav>
        <div class="p-4 border-t bg-gray-50">
            <button onclick="location.href='index.html'" class="w-full text-left p-3 text-red-600 font-bold flex items-center space-x-3 hover:bg-red-50 rounded-lg"><i class="fas fa-sign-out-alt"></i> <span>Log Out</span></button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white h-16 border-b flex items-center justify-between px-8 shadow-sm">
            <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Shar Petroleum System</div>
            <div id="roleLabel" class="text-[9px] bg-blue-100 text-blue-600 px-3 py-1 rounded-full font-bold">ADMIN</div>
        </header>

        <div class="p-8 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-xl font-bold text-gray-800 uppercase">Station Daily Records</h1>
                    <p class="text-xs text-gray-400 mt-1 italic">Vat 15% is automatically subtracted (Total / 1.15)</p>
                </div>
                <button onclick="toggleModal()" id="addBtn" class="admin-only bg-[#00adef] hover:bg-blue-600 text-white px-6 py-2 rounded-lg font-bold text-[11px] shadow-xl transition flex items-center space-x-2">
                    <i class="fas fa-plus-circle"></i> <span>ADD NEW DATA</span>
                </button>
            </div>

            <div class="bg-white rounded-2xl border border-gray-100 shadow-xl overflow-x-auto">
                <table class="w-full text-left text-xs border-collapse min-w-[950px]">
                    <thead class="bg-gray-50 text-gray-500 font-black uppercase text-[9px] border-b">
                        <tr>
                            <th class="p-4">Date</th>
                            <th class="p-4">Station</th>
                            <th class="p-4">Cash</th>
                            <th class="p-4">Visa</th>
                            <th class="p-4">Master</th>
                            <th class="p-4">Mada</th>
                            <th class="p-4 text-red-400">VAT (-15%)</th>
                            <th class="p-4 text-green-600">Net Total (1.15)</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50" id="tableBody">
                        <tr><td colspan="8" class="p-10 text-center text-gray-400">Updating table...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="entryModal" class="fixed inset-0 flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl p-8 border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-gray-800 uppercase text-sm tracking-widest">New Entry (VAT Inclusive)</h3>
                <button onclick="toggleModal()" class="text-gray-300 hover:text-red-500 text-2xl">&times;</button>
            </div>
            <form onsubmit="event.preventDefault(); addData();">
                <div class="space-y-4">
                    <input type="text" id="sName" class="w-full p-3 border rounded-xl bg-gray-50 text-sm outline-none" placeholder="Station Name" required>
                    <input type="number" id="sAmount" class="w-full p-3 border rounded-xl bg-gray-50 text-sm outline-none font-bold" placeholder="Cash Sales Amount" step="0.01" required>
                    <div class="grid grid-cols-3 gap-2">
                        <input type="number" id="sVisa" placeholder="Visa" class="w-full p-3 border rounded-xl bg-gray-50 text-xs outline-none" step="0.01">
                        <input type="number" id="sMaster" placeholder="Master" class="w-full p-3 border rounded-xl bg-gray-50 text-xs outline-none" step="0.01">
                        <input type="number" id="sMada" placeholder="Mada" class="w-full p-3 border rounded-xl bg-gray-50 text-xs outline-none" step="0.01">
                    </div>
                    <button type="submit" id="saveBtn" class="w-full bg-blue-900 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-black transition-all uppercase text-[11px] tracking-widest">Process & Save to Cloud</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzw8lyzJB0rOcLkcH0V5V3hC08XHe3ASHTKfee9GW9OqzzkF9I_Df2BHe8qqqfZAo-M/exec";

        function toggleModal() {
            const modal = document.getElementById('entryModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                const tableBody = document.getElementById('tableBody');
                tableBody.innerHTML = "";
                data.reverse().forEach(row => {
                    const date = new Date(row.date).toLocaleDateString();
                    tableBody.innerHTML += `
                        <tr class="hover:bg-blue-50/50 transition">
                            <td class="p-4 text-gray-400">${date}</td>
                            <td class="p-4 font-black text-blue-900 uppercase">${row.stationName}</td>
                            <td class="p-4">${parseFloat(row.salesAmount || 0).toFixed(2)}</td>
                            <td class="p-4 text-blue-500 font-bold">${parseFloat(row.visa || 0).toFixed(2)}</td>
                            <td class="p-4 text-orange-500 font-bold">${parseFloat(row.master || 0).toFixed(2)}</td>
                            <td class="p-4 text-green-600 font-bold">${parseFloat(row.mada || 0).toFixed(2)}</td>
                            <td class="p-4 text-red-500 font-medium italic">-${parseFloat(row.vatAmount || 0).toFixed(2)}</td>
                            <td class="p-4 font-black text-gray-900 bg-gray-50/50">${parseFloat(row.totalAmount || 0).toFixed(2)}</td>
                        </tr>`;
                });
            } catch (error) { console.log(error); }
        }

        async function addData() {
            const btn = document.getElementById('saveBtn');
            const cash = parseFloat(document.getElementById('sAmount').value) || 0;
            const visa = parseFloat(document.getElementById('sVisa').value) || 0;
            const master = parseFloat(document.getElementById('sMaster').value) || 0;
            const mada = parseFloat(document.getElementById('sMada').value) || 0;

            // ভ্যাট অন্তর্ভুক্ত টোটাল সেলস
            const grossSales = cash + visa + master + mada;

            // সূত্র: Gross / 1.15 = Net Total
            const netTotal = (grossSales / 1.15).toFixed(2);
            const vatSubtracted = (grossSales - netTotal).toFixed(2);

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> SYNCING...';

            const payload = {
                stationName: document.getElementById('sName').value,
                salesAmount: cash,
                visa: visa,
                master: master,
                mada: mada,
                vatAmount: vatSubtracted, // বিয়োগ হওয়া ভ্যাট
                totalAmount: netTotal     // ভ্যাট বাদে আসল নিট টাকা
            };

            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            toggleModal();
            loadData();
            btn.disabled = false;
            btn.innerHTML = 'Process & Save to Cloud';
            document.querySelectorAll('input').forEach(i => i.value = "");
        }

        function checkRole() {
            const role = localStorage.getItem('userRole');
            if (role === 'admin') document.getElementById('addBtn').style.display = 'flex';
        }
        window.onload = () => { checkRole(); loadData(); };
    </script>
</body>
</html>
