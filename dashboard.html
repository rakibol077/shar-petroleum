<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shar Petroleum - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: white; border-radius: 30px; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; }
        .sidebar-active { background: #2563eb; color: white; box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4); }
        #entryModal { display: none; }
        #entryModal.active { display: flex; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 bg-white border-r border-slate-100 flex flex-col p-6 fixed h-full">
        <div class="flex items-center gap-3 mb-12 px-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-droplet text-xl"></i>
            </div>
            <div>
                <h1 class="text-sm font-extrabold text-blue-900 uppercase tracking-tight">Shar Petroleum</h1>
                <p class="text-[10px] text-blue-400 font-bold italic uppercase leading-none">Management System</p>
            </div>
        </div>
        <nav class="flex-1 space-y-2">
            <button class="w-full flex items-center gap-4 px-5 py-4 sidebar-active rounded-2xl font-bold text-xs uppercase transition-all">
                <i class="fas fa-chart-pie text-lg"></i> Analytics Dashboard
            </button>
        </nav>
        <button onclick="window.location.href='index.html'" class="w-full py-4 border border-slate-100 text-red-500 rounded-2xl font-bold text-xs uppercase mt-auto flex items-center justify-center gap-2 hover:bg-red-50 transition">
            <i class="fas fa-sign-out-alt"></i> Logout System
        </button>
    </aside>

    <main class="flex-1 ml-72 p-10">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
            <div class="glass-card p-8"><p class="text-[10px] font-extrabold text-slate-400 uppercase mb-2">Gross Sales</p><h2 id="totalGross" class="text-2xl font-black text-blue-900">0.00 SR</h2></div>
            <div class="glass-card p-8"><p class="text-[10px] font-extrabold text-red-400 uppercase mb-2">VAT (15%)</p><h2 id="totalTax" class="text-2xl font-black text-red-500">0.00 SR</h2></div>
            <div class="glass-card p-8"><p class="text-[10px] font-extrabold text-green-500 uppercase mb-2">Net Profit</p><h2 id="totalNet" class="text-2xl font-black text-slate-900">0.00 SR</h2></div>
            <div class="glass-card p-8"><p class="text-[10px] font-extrabold text-orange-400 uppercase mb-2">System Status</p><h2 class="text-2xl font-black text-orange-500">ACTIVE</h2></div>
        </div>

        <div class="flex justify-between items-end mb-6 px-2">
            <h3 class="text-2xl font-black text-slate-800 italic uppercase">Transaction Records</h3>
            <button onclick="openModal()" class="px-10 py-5 bg-[#1e3a8a] text-white rounded-[25px] font-bold text-xs uppercase shadow-xl hover:bg-blue-800 transition-all flex items-center gap-3">
                <i class="fas fa-plus-circle text-lg"></i> Add New Entry
            </button>
        </div>

        <div class="glass-card overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50/50 uppercase text-[10px] text-slate-400">
                    <tr>
                        <th class="p-8">Date</th>
                        <th class="p-8">Station Name</th>
                        <th class="p-8">Visa</th>
                        <th class="p-8 text-orange-400">Master</th>
                        <th class="p-8 text-blue-600">Mada</th>
                        <th class="p-8 text-red-400">VAT (-15%)</th>
                        <th class="p-8 font-black text-slate-900">Net Total</th>
                        <th class="p-8 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-xs font-bold divide-y divide-slate-50">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="entryModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white p-10 rounded-[40px] w-full max-w-md shadow-2xl relative">
            <h2 id="modalTitle" class="text-xl font-black mb-6 uppercase italic text-blue-900">Record Transaction</h2>
            <form id="dataForm" class="space-y-4">
                <input type="hidden" id="editIndex">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Select Date</label>
                    <input type="date" id="formDate" required class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Station Name</label>
                    <input type="text" id="formStation" placeholder="e.g. STATION 01" required class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm uppercase outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-blue-600 uppercase ml-2">Mada</label>
                        <input type="number" step="any" id="formMada" placeholder="0.00" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-600 uppercase ml-2">Visa</label>
                        <input type="number" step="any" id="formVisa" placeholder="0.00" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-orange-400 uppercase ml-2">Master</label>
                        <input type="number" step="any" id="formMaster" placeholder="0.00" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm outline-none">
                    </div>
                </div>
                <div class="flex gap-4 mt-8">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold uppercase text-xs hover:bg-slate-200 transition">Cancel</button>
                    <button type="submit" id="saveBtn" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold uppercase text-xs shadow-lg hover:bg-blue-700 transition">Save Data</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // আপনার নতুন গুগল স্ক্রিপ্ট URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxKLfOfUGjp0oqEXTHhkR1gbuiAkmto37g5WSPHiK18NiOB4jEOHehsbG-l6CpD7lb6/exec";
        let cachedData = [];

        function openModal(editIdx = null) {
            const modal = document.getElementById('entryModal');
            modal.classList.add('active');
            if(editIdx !== null) {
                document.getElementById('modalTitle').innerText = "Edit Entry";
                const row = cachedData[editIdx];
                document.getElementById('editIndex').value = editIdx;
                
                // Date handling
                if(row.date || row.Date) {
                    const d = new Date(row.date || row.Date);
                    document.getElementById('formDate').value = d.toISOString().split('T')[0];
                }
                
                document.getElementById('formStation').value = row.stationname || row.Station || row.stationName || "";
                document.getElementById('formMada').value = row.mada || row.Mada || 0;
                document.getElementById('formVisa').value = row.visa || row.Visa || 0;
                document.getElementById('formMaster').value = row.master || row.Master || 0;
            } else {
                document.getElementById('modalTitle').innerText = "New Record";
                document.getElementById('dataForm').reset();
                document.getElementById('editIndex').value = "";
            }
        }

        function closeModal() { document.getElementById('entryModal').classList.remove('active'); }

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                cachedData = data;
                renderTable(data);
            } catch(e) { console.error("Could not fetch data"); }
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            let gTotal=0, tVat=0, tNet=0;

            // নতুন ডাটা সবার উপরে দেখানোর জন্য reverse করা হয়েছে
            data.slice().reverse().forEach((row, index) => {
                const actualIndex = data.length - 1 - index;
                
                // Smart mapping: কলামের নাম যাই হোক ডাটা খুঁজে নেবে
                const m = parseFloat(row.mada || row.Mada || row.MADA || 0);
                const v = parseFloat(row.visa || row.Visa || row.VISA || 0);
                const ms = parseFloat(row.master || row.Master || row.MASTER || 0);
                const station = row.stationname || row.Station || row.stationName || "N/A";
                
                const rawDate = row.date || row.Date;
                const dateStr = rawDate ? new Date(rawDate).toLocaleDateString('en-GB') : "---";

                const gross = m + v + ms;
                const net = gross / 1.15;
                const vat = gross - net;
                
                gTotal += gross; tVat += vat; tNet += net;

                body.innerHTML += `
                    <tr class="hover:bg-slate-50/80 transition-all border-b border-slate-50">
                        <td class="p-8 text-slate-400 font-medium">${dateStr}</td>
                        <td class="p-8 text-blue-900 font-black uppercase italic tracking-tighter">${station}</td>
                        <td class="p-8 text-slate-500">${v.toFixed(2)}</td>
                        <td class="p-8 text-orange-400">${ms.toFixed(2)}</td>
                        <td class="p-8 text-blue-600 font-black">${m.toFixed(2)}</td>
                        <td class="p-8 text-red-400">-${vat.toFixed(2)}</td>
                        <td class="p-8 text-slate-900 font-extrabold">${net.toFixed(2)}</td>
                        <td class="p-8 text-center">
                            <div class="flex justify-center gap-3">
                                <button onclick="openModal(${actualIndex})" class="w-8 h-8 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-edit text-xs"></i></button>
                                <button onclick="deleteRow(${actualIndex})" class="w-8 h-8 rounded-full bg-red-50 text-red-300 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-trash-alt text-xs"></i></button>
                            </div>
                        </td>
                    </tr>`;
            });

            document.getElementById('totalGross').innerText = gTotal.toLocaleString() + " SR";
            document.getElementById('totalTax').innerText = tVat.toLocaleString() + " SR";
            document.getElementById('totalNet').innerText = tNet.toLocaleString() + " SR";
        }

        document.getElementById('dataForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const editIdx = document.getElementById('editIndex').value;
            btn.innerText = "Processing..."; btn.disabled = true;

            const payload = {
                date: document.getElementById('formDate').value,
                stationName: document.getElementById('formStation').value.toUpperCase(),
                mada: Number(document.getElementById('formMada').value) || 0,
                visa: Number(document.getElementById('formVisa').value) || 0,
                master: Number(document.getElementById('formMaster').value) || 0,
                action: editIdx === "" ? "add" : "edit",
                index: editIdx
            };

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' })
            .then(() => {
                setTimeout(() => {
                    closeModal();
                    loadData();
                    btn.innerText = "Save Data"; btn.disabled = false;
                }, 2000);
            });
        };

        async function deleteRow(idx) {
            if(!confirm("Delete this entry forever?")) return;
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ index: idx, action: "delete" }), 
                mode: 'no-cors' 
            });
            setTimeout(loadData, 1500);
        }

        window.onload = loadData;
    </script>
</body>
</html>
