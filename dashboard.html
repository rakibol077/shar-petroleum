<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shar Petroleum - Management Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        .premium-card { box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.05); border-radius: 40px; border: 1px solid rgba(0,0,0,0.02); }
        body.dark { background-color: #0b0f19; color: #f8fafc; }
        .dark .bg-white { background-color: #161d2f !important; color: white; border-color: #1e293b; }
        .dark input { background-color: #1e293b !important; color: white; border: 1px solid #334155 !important; }
        #entryModal { display: none; }
        #entryModal.active { display: flex; }
    </style>
</head>
<body class="bg-[#f4f7fe] flex min-h-screen">

    <aside class="w-80 bg-white border-r border-slate-50 flex flex-col p-8 no-print">
        <div class="flex items-center gap-4 mb-12">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg text-white">
                <i class="fas fa-droplet text-xl"></i>
            </div>
            <div>
                <h1 class="text-sm font-extrabold uppercase text-blue-900 tracking-tighter">Shar Petroleum</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase italic">Admin Panel</p>
            </div>
        </div>
        <nav class="flex-1 space-y-4">
            <button class="w-full flex items-center gap-4 px-6 py-5 bg-blue-600 text-white rounded-[25px] font-bold text-sm shadow-xl shadow-blue-100">
                <i class="fas fa-chart-line"></i> DASHBOARD
            </button>
            <button onclick="toggleDarkMode()" class="w-full flex items-center gap-4 px-6 py-5 text-slate-500 hover:bg-slate-50 rounded-[25px] font-bold text-sm transition">
                <i id="modeIcon" class="fas fa-moon text-blue-500"></i> <span id="modeText">NIGHT MODE</span>
            </button>
        </nav>
        <button onclick="logout()" class="w-full py-5 bg-slate-50 text-red-500 rounded-[25px] font-extrabold text-[11px] uppercase tracking-widest hover:bg-red-50 transition">
            <i class="fas fa-power-off mr-2"></i> LOGOUT
        </button>
    </aside>

    <main class="flex-1 p-12 overflow-y-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
            <div class="bg-white p-10 premium-card text-center border-b-4 border-blue-500">
                <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-2">Total Card Sales</p>
                <h2 id="totalGross" class="text-3xl font-extrabold text-slate-900">0 SR</h2>
            </div>
            <div class="bg-white p-10 premium-card text-center border-b-4 border-red-400">
                <p class="text-[10px] font-extrabold text-red-400 uppercase tracking-widest mb-2">VAT 15% (Card)</p>
                <h2 id="totalTax" class="text-3xl font-extrabold text-red-500">0 SR</h2>
            </div>
            <div class="bg-white p-10 premium-card text-center border-b-4 border-green-500">
                <p class="text-[10px] font-extrabold text-green-600 uppercase tracking-widest mb-2">Net (Your Cash)</p>
                <h2 id="totalNet" class="text-3xl font-extrabold text-green-700">0 SR</h2>
            </div>
        </div>

        <div class="flex justify-between items-center mb-10">
            <h3 class="text-xl font-extrabold text-slate-900 italic uppercase">Transaction Logs</h3>
            <button onclick="openModal()" class="bg-blue-900 text-white px-10 py-5 rounded-[25px] font-bold text-xs uppercase shadow-2xl hover:scale-105 transition">
                <i class="fas fa-plus mr-2"></i> Add Entry
            </button>
        </div>

        <div class="bg-white premium-card overflow-hidden">
            <table class="w-full text-left" id="dataTable">
                <thead class="bg-slate-50/50 text-slate-400 font-extrabold uppercase text-[10px]">
                    <tr>
                        <th class="p-8">Date</th>
                        <th class="p-8">Station</th>
                        <th class="p-8 text-blue-600">Mada</th>
                        <th class="p-8 text-orange-400">Visa</th>
                        <th class="p-8 text-emerald-500">Master</th>
                        <th class="p-8 text-red-500">VAT (15%)</th>
                        <th class="p-8 font-black text-slate-900">Gross Total</th>
                        <th class="p-8 font-black text-blue-700 bg-blue-50/50">Net (Your Cash)</th>
                        <th class="p-8 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-50"></tbody>
            </table>
        </div>
    </main>

    <div id="entryModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white p-10 rounded-[40px] w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-black mb-6 uppercase tracking-tighter">Record Card Sales</h2>
            <form id="dataForm" class="space-y-4">
                <input type="date" id="formDate" required class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold text-sm">
                <input type="text" id="formStation" placeholder="Station Name" required class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold text-sm uppercase">
                <div class="grid grid-cols-3 gap-3">
                    <input type="number" step="any" id="formMada" placeholder="Mada" class="p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold text-sm">
                    <input type="number" step="any" id="formVisa" placeholder="Visa" class="p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold text-sm">
                    <input type="number" step="any" id="formMaster" placeholder="Master" class="p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold text-sm">
                </div>
                <div class="flex gap-4 mt-6">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold uppercase text-xs">Cancel</button>
                    <button type="submit" id="saveBtn" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold uppercase text-xs shadow-lg">Save Data</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6KKNxsKijGM5NmiLt1Ye-fBwq0xT3YPNEnmsNlMoPlY1A_hdoGTwAAPWGN_rZwqR1/exec";
        let rawData = [];

        function openModal() { document.getElementById('entryModal').classList.add('active'); }
        function closeModal() { document.getElementById('entryModal').classList.remove('active'); document.getElementById('dataForm').reset(); }

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                rawData = await res.json();
                renderTable(rawData);
            } catch(e) { console.error("Load failed"); }
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            let gTotal=0, tVat=0, tNet=0;

            data.slice().reverse().forEach((row, index) => {
                const actualIndex = data.length - 1 - index;
                const mada = parseFloat(row.mada) || 0;
                const visa = parseFloat(row.visa) || 0;
                const master = parseFloat(row.master) || 0;
                
                const grossTotal = mada + visa + master;
                const netAmount = grossTotal / 1.15;
                const vatAmount = grossTotal - netAmount;
                
                gTotal += grossTotal; tVat += vatAmount; tNet += netAmount;

                body.innerHTML += `
                    <tr class="hover:bg-slate-50/50 transition">
                        <td class="p-8 font-bold text-slate-400">${new Date(row.date).toLocaleDateString()}</td>
                        <td class="p-8 font-black text-blue-900 uppercase italic">${row.stationName}</td>
                        <td class="p-8 font-black text-blue-600">${mada.toFixed(2)}</td>
                        <td class="p-8 font-bold text-orange-400">${visa.toFixed(2)}</td>
                        <td class="p-8 font-bold text-emerald-500">${master.toFixed(2)}</td>
                        <td class="p-8 text-red-500 font-bold">-${vatAmount.toFixed(2)}</td>
                        <td class="p-8 font-black text-slate-900">${grossTotal.toFixed(2)}</td>
                        <td class="p-8 font-black text-blue-700 bg-blue-50/30">${netAmount.toFixed(2)}</td>
                        <td class="p-8 text-center flex justify-center gap-4">
                            <button onclick="deleteRow(${actualIndex})" class="text-red-300 hover:text-red-600 transition"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
            document.getElementById('totalGross').innerText = gTotal.toLocaleString() + " SR";
            document.getElementById('totalTax').innerText = tVat.toLocaleString() + " SR";
            document.getElementById('totalNet').innerText = tNet.toLocaleString() + " SR";
        }

        document.getElementById('dataForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Saving...";
            btn.disabled = true;

            const payload = {
                date: document.getElementById('formDate').value,
                stationName: document.getElementById('formStation').value,
                mada: document.getElementById('formMada').value || 0,
                visa: document.getElementById('formVisa').value || 0,
                master: document.getElementById('formMaster').value || 0,
                action: "add"
            };

            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            
            setTimeout(() => {
                closeModal();
                loadData();
                btn.innerText = "Save Data";
                btn.disabled = false;
            }, 1500);
        };

        async function deleteRow(index) {
            if(!confirm("Delete this record?")) return;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ index: index, action: "delete" }) });
            setTimeout(loadData, 1000);
        }

        window.onload = loadData;
    </script>
</body>
</html>
