<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Shar Petroleum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-only { display: none; }
        .sidebar-item:hover { background: #f1f5f9; }
        .active-menu { background: #f1f5f9; color: #0284c7; border-left: 4px solid #0284c7; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col h-full">
        <div class="p-5 border-b flex items-center space-x-2">
            <img src="https://arpetrolna.comtechsolutionbd.com/assets/images/logo.png" class="w-8">
            <span class="text-blue-900 font-black text-sm">SHAR PETROLEUM</span>
        </div>
        <nav class="flex-1 p-4 space-y-1 text-sm text-gray-600">
            <div class="sidebar-item active-menu p-3 flex items-center space-x-3 rounded-lg cursor-pointer"><i class="fas fa-home"></i><span>Dashboard</span></div>
            <div class="pt-4 pb-2 px-3 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Reports</div>
            <div class="sidebar-item p-3 flex items-center space-x-3 rounded-lg cursor-pointer"><i class="fas fa-file-invoice"></i><span>Tax Invoice</span></div>
            <div class="sidebar-item p-3 flex items-center space-x-3 rounded-lg cursor-pointer"><i class="fas fa-gas-pump"></i><span>Station Report</span></div>
            <div class="sidebar-item p-3 flex items-center space-x-3 rounded-lg cursor-pointer"><i class="fas fa-chart-line"></i><span>Vat Report</span></div>
            <div onclick="location.href='index.html'" class="mt-10 p-3 flex items-center space-x-3 rounded-lg cursor-pointer text-red-500 font-bold hover:bg-red-50"><i class="fas fa-sign-out-alt"></i><span>Logout</span></div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full">
        <header class="bg-white border-b p-4 px-8 flex justify-between items-center shadow-sm">
            <h2 class="font-bold text-gray-600">Control Panel</h2>
            <div class="flex items-center space-x-3">
                <span id="roleBadge" class="text-[10px] px-2 py-1 bg-gray-100 rounded-full font-bold">GUEST</span>
                <div class="w-8 h-8 bg-blue-600 rounded-full text-white flex items-center justify-center font-bold text-xs">R</div>
            </div>
        </header>

        <div class="p-8 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-2xl font-black text-gray-800 uppercase">Station Master Data</h1>
                    <p class="text-sm text-gray-500 mt-1">সব স্টেশনের ডাটা এখান থেকে মনিটর করুন।</p>
                </div>
                <button class="admin-only bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold text-sm shadow-lg flex items-center space-x-2 transition-all">
                    <i class="fas fa-plus"></i><span>NEW ENTRY</span>
                </button>
            </div>

            <div class="bg-white border border-gray-100 rounded-2xl shadow-sm overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 text-gray-400 font-bold uppercase text-[10px]">
                        <tr>
                            <th class="p-4 border-b">Station Name</th>
                            <th class="p-4 border-b">Total Sale</th>
                            <th class="p-4 border-b">Vat (15%)</th>
                            <th class="p-4 border-b text-center admin-only">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="text-gray-700">
                        <tr class="border-b hover:bg-blue-50/30">
                            <td class="p-4 font-bold">Khalis Petroleum</td>
                            <td class="p-4">SAR 24,500.00</td>
                            <td class="p-4">3,675.00</td>
                            <td class="p-4 text-center admin-only text-blue-500 space-x-4"><i class="fas fa-edit cursor-pointer"></i> <i class="fas fa-trash cursor-pointer text-red-400"></i></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        window.onload = function() {
            const role = localStorage.getItem('userRole');
            if (role === 'admin') {
                const adminFields = document.querySelectorAll('.admin-only');
                adminFields.forEach(el => el.style.display = 'block');
                document.getElementById('roleBadge').innerText = "ADMIN MODE";
                document.getElementById('roleBadge').classList.add('bg-blue-100', 'text-blue-700');
            } else {
                document.getElementById('roleBadge').innerText = "VIEWER MODE (READ ONLY)";
                document.getElementById('roleBadge').classList.add('bg-orange-100', 'text-orange-700');
            }
        };
    </script>
</body>
</html>
