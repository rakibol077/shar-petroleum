<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shar Petroleum - Management Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s ease; }
        
        /* Dark Mode Colors */
        .dark-mode { background-color: #0f172a !important; color: #f1f5f9; }
        .dark-mode aside { background-color: #1e293b !important; border-color: #334155; }
        .dark-mode .bg-white { background-color: #1e293b !important; color: white; border-color: #334155 !important; }
        .dark-mode .text-slate-900 { color: #f1f5f9; }
        .dark-mode input, .dark-mode select { background-color: #334155 !important; color: white; border: 1px solid #475569 !important; }
        .dark-mode tr:hover { background-color: #334155 !important; }
        .dark-mode .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }

        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-[#f8fafc] flex min-h-screen" id="mainBody">

    <aside class="w-72 bg-white border-r border-slate-100 flex flex-col no-print transition-all">
        <div class="p-8 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <i class="fas fa-droplet text-xl"></i>
            </div>
            <div>
                <h1 class="text-sm font-extrabold uppercase tracking-tight text-blue-900">Shar Petroleum</h1>
                <p id="userRoleBadge" class="text-[9px] font-bold text-slate-400 uppercase italic">Admin Account</p>
            </div>
        </div>

        <nav class="flex-1 px-4 space-y-2 mt-4">
            <button class="w-full flex items-center gap-4 px-6 py-4 bg-blue-600 text-white rounded-2xl font-bold text-sm shadow-xl shadow-blue-100 transition">
                <i class="fas fa-chart-line text-lg"></i> Analytics Dashboard
            </button>
            
            <button onclick="toggleTheme()" class="w-full flex items-center gap-4 px-6 py-4 text-slate-500 hover:bg-slate-50 rounded-2xl font-bold text-sm transition">
                <i id="themeIcon" class="fas fa-moon text-lg text-blue-500"></i> <span id="themeText">Night Mode</span>
            </button>
        </nav>

        <div class="p-8 mt-auto">
            <button onclick="logout()" class="w-full py-4 border-2 border-slate-100 text-red-500 rounded-2xl font-extrabold text-[11px] uppercase tracking-widest hover:bg-red-50 transition">
                <i class="fas fa-power-off mr-2"></i> Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        
        <header class="flex justify-between items-center mb-10 no-print">
            <div class="flex gap-4 items-center">
                <div class="relative w-64">
                    <i class="fas fa-calendar absolute left-4 top-3.5 text-slate-300 text-xs"></i>
                    <input type="date" id="startDate" class="w-full pl-10 pr-4 py-3 bg-white rounded-2xl card-shadow border-none text-xs font-bold outline-none focus:ring-2 ring-blue-100">
                </div>
                <span class="text-slate-300 font-bold">to</span>
                <div class="relative w-64">
                    <i class="fas fa-calendar absolute left-4 top-3.5 text-slate-300 text-xs"></i>
                    <input type="date" id="endDate" class="w-full pl-10 pr-4 py-3 bg-white rounded-2xl card-shadow border-none text-xs font-bold outline-none focus:ring-2 ring-blue-100">
                </div>
                <button onclick="applyDateFilter()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold text-xs uppercase hover:bg-black transition shadow-lg">Filter</button>
            </div>
            
            <div class="flex gap-3">
                <button onclick="window.print()" class="px-6 py-3 bg-slate-800 text-white rounded-2xl font-bold text-[10px] uppercase tracking-widest hover:scale-105 transition shadow-lg">Print Report</button>
            </div>
        </header>

        <div class="grid grid-cols-4 gap-6 mb-12">
            <div class="bg-white p-8 rounded-[35px] card-shadow border border-slate-50 relative overflow-hidden">
                <p class="text-[10px] font-extrabold text-slate-400 uppercase mb-2">Gross Sales</p>
                <h2 id="totalGross" class="text-3xl font-extrabold text-slate-900 tracking-tight">0.00 SR</h2>
                <div class="absolute -right-4 -bottom-4 opacity-5 text-6xl"><i class="fas fa-chart-line"></i></div>
            </div>
            <div class="admin-only hidden bg-white p-8 rounded-[35px] card-shadow border border-slate-50">
                <p class="text-[10px] font-extrabold text-red-400 uppercase mb-2">VAT (15%)</p>
                <h2 id="totalTax" class="text-3xl font-extrabold text-red-500 tracking-tight">0.00 SR</h2>
            </div>
            <div class="admin-only hidden bg-white p-8 rounded-[35px] card-shadow border border-slate-50 border-l-4 border-l-blue-600">
                <p class="text-[10px] font-extrabold text-blue-600 uppercase mb-2">Net Profit</p>
                <h2 id="pureNet" class="text-3xl font-extrabold text-slate-900 tracking-tight">0.00 SR</h2>
            </div>
            <div class="bg-white p-8 rounded-[35px] card-shadow border border-slate-50">
                <p class="text-[10px] font-extrabold text-orange-400 uppercase mb-2">Transactions</p>
                <h2 id="recordCount" class="text-3xl font-extrabold text-slate-900 tracking-tight">0</h2>
            </div>
        </div>

        <div class="flex justify-between items-center mb-8">
            <h3 class="text-xl font-extrabold text-slate-900 italic tracking-tighter uppercase">Transaction Records</h3>
            <button id="addBtn" onclick="openModal()" class="hidden bg-blue-900 text-white px-8 py-4 rounded-2xl font-bold text-xs uppercase shadow-2xl hover:scale-105 transition no-print">
                <i class="fas fa-plus mr-2"></i> Add Entry
            </button>
        </div>

        <div class="bg-white rounded-[40px] card-shadow border border-slate-50 overflow-hidden">
            <table class="w-full text-left text-[12px] border-collapse">
                <thead class="bg-slate-50/50 text-slate-400 font-extrabold uppercase text-[10px] border-b">
                    <tr>
                        <th class="p-8">Date</th>
                        <th class="p-8">Station</th>
                        <th class="p-8">Visa</th>
                        <th class="p-8">Master</th>
                        <th class="p-8 text-blue-600">Mada</th>
                        <th class="p-8 text-red-500 admin-only hidden">VAT (-15%)</th>
                        <th class="p-8 font-extrabold text-slate-900">Net Total</th>
                        <th class="p-8 text-center admin-only hidden no-print">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-50">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="entryModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center z-[100] no-print px-6">
        <div class="bg-white rounded-[45px] w-full max-w-md p-10 card-shadow">
            <h3 class="font-extrabold text-slate-900 uppercase text-sm mb-8 text-center border-b pb-5">Record New Shift</h3>
            <form onsubmit="event.preventDefault(); addData();" class="space-y-6">
                <div class="grid grid-cols-1 gap-4">
                    <input type="text" id="sName" placeholder="Station Name" class="p-4 bg-slate-50 border-none rounded-2xl outline-none font-bold text-sm uppercase" required>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div class="text-center">
                        <label class="text-[9px] font-black text-blue-600 uppercase mb-1 block">Mada</label>
                        <input type="number" step="0.01" id="sMada" placeholder="0.00" class="w-full p-4 bg-blue-50/50 border-none rounded-2xl font-bold text-center text-blue-600 outline-none">
                    </div>
                    <div class="text-center">
                        <label class="text-[9px] font-black text-slate-400 uppercase mb-1 block">Visa</label>
                        <input type="number" step="0.01" id="sVisa" placeholder="0.00" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-center outline-none">
                    </div>
                    <div class="text-center">
                        <label class="text-[9px] font-black text-orange-400 uppercase mb-1 block">Master</label>
                        <input type="number" step="0.01" id="sMaster" placeholder="0.00" class="w-full p-4 bg-orange-50/50 border-none rounded-2xl font-bold text-center text-orange-600 outline-none">
                    </div>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 bg-slate-100 rounded-2xl font-extrabold text-[10px] uppercase">Cancel</button>
                    <button type="submit" id="saveBtn" class="flex-[2] py-4 bg-blue-600 text-white rounded-2xl font-extrabold text-[10px] uppercase shadow-lg shadow-blue-100">Sync to Cloud</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCFX8Ul8xu0CrgiSnRqbBqv1G8hTuo-GhTZqKfB7oe58jhgkXjzE56AGMt_42swBo/exec";
        const role = localStorage.getItem('userRole');
        let rawData = [];

        // --- Theme Toggle Logic ---
        function toggleTheme() {
            const body = document.getElementById('mainBody');
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');
            
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            
            icon.className = isDark ? 'fas fa-sun text-lg text-yellow-400' : 'fas fa-moon text-lg text-blue-500';
            text.innerText = isDark ? 'Day Mode' : 'Night Mode';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // --- Permissions ---
        function applyPermissions() {
            const badge = document.getElementById('userRoleBadge');
            if (role === 'admin') {
                badge.innerText = "Admin Account";
                document.getElementById('addBtn').classList.remove('hidden');
                document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
            } else {
                badge.innerText = "Staff View (Limited)";
            }
        }

        // --- Data Loading ---
        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                rawData = await res.json();
                renderTable(rawData);
            } catch (e) { alert("Data fetch failed. Check URL."); }
        }

        // --- Filter Logic ---
        function applyDateFilter() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            if(!start || !end) return alert("Select date range!");

            const filtered = rawData.filter(row => {
                const d = new Date(row.date);
                return d >= new Date(start) && d <= new Date(end).setHours(23,59,59);
            });
            renderTable(filtered);
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            let gTotal = 0, tNet = 0;

            data.slice().reverse().forEach(row => {
                const total = (parseFloat(row.mada)||0) + (parseFloat(row.visa)||0) + (parseFloat(row.master)||0);
                const vat = total - (total/1.15);
                const net = total/1.15;
                gTotal += total; tNet += net;

                let rowHtml = `
                    <tr class="hover:bg-slate-50 transition border-b border-slate-50 last:border-0">
                        <td class="p-8 font-bold text-slate-400">${new Date(row.date).toLocaleDateString()}</td>
                        <td class="p-8 font-extrabold text-blue-900 uppercase italic tracking-tighter">${row.stationName}</td>
                        <td class="p-8 font-semibold text-slate-600">${(row.visa||0).toFixed(2)}</td>
                        <td class="p-8 font-semibold text-orange-400">${(row.master||0).toFixed(2)}</td>
                        <td class="p-8 font-extrabold text-blue-600">${(row.mada||0).toFixed(2)}</td>`;
                
                if (role === 'admin') {
                    rowHtml += `<td class="p-8 text-red-500 font-bold">-${vat.toFixed(2)}</td>`;
                }
                
                rowHtml += `<td class="p-8 font-extrabold text-slate-900">${net.toFixed(2)}</td>`;
                
                if (role === 'admin') {
                    rowHtml += `<td class="p-8 text-center no-print">
                        <div class="flex justify-center gap-3 text-slate-200">
                            <i class="fas fa-edit cursor-pointer hover:text-blue-500 transition"></i>
                            <i onclick="deleteEntry('${row.id}')" class="fas fa-trash-alt cursor-pointer hover:text-red-500 transition"></i>
                        </div>
                    </td>`;
                }
                body.innerHTML += rowHtml + `</tr>`;
            });

            document.getElementById('totalGross').innerText = gTotal.toLocaleString() + " SR";
            document.getElementById('recordCount').innerText = data.length;
            if (role === 'admin') {
                document.getElementById('totalTax').innerText = (gTotal - tNet).toLocaleString() + " SR";
                document.getElementById('pureNet').innerText = tNet.toLocaleString() + " SR";
            }
        }

        async function addData() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerHTML = "Syncing...";
            const payload = {
                stationName: document.getElementById('sName').value,
                mada: document.getElementById('sMada').value,
                visa: document.getElementById('sVisa').value,
                master: document.getElementById('sMaster').value
            };
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            closeModal(); loadData();
            btn.disabled = false; btn.innerHTML = "Sync to Cloud";
        }

        function openModal() { document.getElementById('entryModal').classList.replace('hidden', 'flex'); }
        function closeModal() { document.getElementById('entryModal').classList.replace('flex', 'hidden'); }
        function logout() { localStorage.clear(); window.location.href = "index.html"; }

        // Initialize
        window.onload = () => {
            if(!role) window.location.href = "index.html";
            if(localStorage.getItem('theme') === 'dark') toggleTheme();
            applyPermissions();
            loadData();
        };
    </script>
</body>
</html>
