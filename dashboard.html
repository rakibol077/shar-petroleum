<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shar Petroleum - Management Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        .premium-card { box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.05); border-radius: 40px; }
        
        /* Dark Mode */
        body.dark { background-color: #0b0f19; color: #f8fafc; }
        .dark .bg-white { background-color: #161d2f !important; color: white; border-color: #1e293b; }
        .dark .text-slate-900, .dark .text-blue-900 { color: #f8fafc; }
        .dark .bg-slate-50 { background-color: #1e293b !important; }
        .dark input, .dark select { background-color: #1e293b !important; color: white; border: 1px solid #334155 !important; }

        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="bg-[#f4f7fe] flex min-h-screen">

    <aside class="w-80 bg-white border-r border-slate-50 flex flex-col no-print p-8">
        <div class="flex items-center gap-4 mb-12">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg text-white">
                <i class="fas fa-droplet text-xl"></i>
            </div>
            <div>
                <h1 class="text-sm font-extrabold uppercase text-blue-900">Shar Petroleum</h1>
                <p class="text-[10px] font-bold text-slate-400">ADMIN PANEL</p>
            </div>
        </div>
        <nav class="flex-1 space-y-4">
            <button class="w-full flex items-center gap-4 px-6 py-5 bg-blue-600 text-white rounded-[25px] font-bold text-sm shadow-xl">
                <i class="fas fa-chart-line"></i> DASHBOARD
            </button>
            <button onclick="toggleDarkMode()" class="w-full flex items-center gap-4 px-6 py-5 text-slate-500 hover:bg-slate-50 rounded-[25px] font-bold text-sm transition">
                <i id="modeIcon" class="fas fa-moon text-blue-500"></i> <span id="modeText">NIGHT MODE</span>
            </button>
        </nav>
        <button onclick="logout()" class="w-full py-5 bg-slate-50 text-red-500 rounded-[25px] font-extrabold text-[11px] uppercase tracking-widest">
            <i class="fas fa-power-off mr-2"></i> LOGOUT
        </button>
    </aside>

    <main class="flex-1 p-12 overflow-y-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="relative w-full md:w-80 bg-white premium-card flex items-center px-6 py-1">
                <i class="fas fa-search text-slate-300"></i>
                <input type="text" id="searchInput" onkeyup="searchStation()" placeholder="Search Station..." class="w-full bg-transparent border-none text-xs font-bold outline-none p-4">
            </div>
            <div class="flex items-center gap-4 bg-white p-2 px-6 rounded-[25px] premium-card">
                <input type="date" id="startDate" class="bg-transparent border-none text-xs font-bold outline-none p-2 text-slate-500">
                <span class="text-slate-300">to</span>
                <input type="date" id="endDate" class="bg-transparent border-none text-xs font-bold outline-none p-2 text-slate-500">
                <button onclick="applyFilter()" class="bg-blue-600 text-white px-6 py-2 rounded-2xl font-bold text-[10px] uppercase">Filter</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <div class="bg-white p-10 premium-card"><canvas id="salesChart" height="120"></canvas></div>
            <div class="bg-white p-10 premium-card"><canvas id="taxChart" height="120"></canvas></div>
        </div>

        <div class="flex justify-between items-center mb-10">
            <h3 class="text-xl font-extrabold text-slate-900 uppercase italic">Recent Transactions</h3>
            <button onclick="openModal()" class="bg-blue-900 text-white px-10 py-5 rounded-[25px] font-bold text-xs uppercase shadow-2xl hover:scale-105 transition">
                <i class="fas fa-plus mr-2"></i> Add Entry
            </button>
        </div>

        <div class="bg-white premium-card overflow-hidden">
            <table class="w-full text-left" id="dataTable">
                <thead class="bg-slate-50/50 text-slate-400 font-extrabold uppercase text-[10px]">
                    <tr>
                        <th class="p-8">Date</th>
                        <th class="p-8">Station</th>
                        <th class="p-8">Visa</th>
                        <th class="p-8">Mada</th>
                        <th class="p-8 text-red-500">VAT</th>
                        <th class="p-8 text-slate-900">Total</th>
                        <th class="p-8 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-50"></tbody>
            </table>
        </div>
    </main>

    <div id="entryModal" class="modal flex items-center justify-center">
        <div class="bg-white p-10 rounded-[40px] w-[500px] shadow-2xl relative">
            <h2 class="text-xl font-black mb-6 uppercase">New Transaction</h2>
            <form id="dataForm" class="space-y-4">
                <input type="date" id="formDate" required class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold text-sm">
                <input type="text" id="formStation" placeholder="Station Name" required class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold text-sm">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="formVisa" placeholder="Visa" class="p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold text-sm">
                    <input type="number" id="formMada" placeholder="Mada" class="p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold text-sm">
                </div>
                <div class="flex gap-4 mt-6">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold uppercase text-xs">Cancel</button>
                    <button type="submit" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold uppercase text-xs shadow-lg shadow-blue-200">Save Data</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "YOUR_GOOGLE_SCRIPT_URL_HERE"; // আপনার বর্তমান স্ক্রিপ্ট URL এখানে দিন
        let rawData = [];
        let salesChart, taxChart;

        // Modal Controls
        function openModal() { document.getElementById('entryModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('entryModal').style.display = 'none'; }

        // Load Data
        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                rawData = await res.json();
                renderDashboard(rawData);
            } catch (e) { console.log("Error loading data"); }
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            data.slice().reverse().forEach((row, index) => {
                const total = (parseFloat(row.mada)||0) + (parseFloat(row.visa)||0) + (parseFloat(row.master)||0);
                const vat = total - (total/1.15);
                body.innerHTML += `
                    <tr class="hover:bg-slate-50/50 transition">
                        <td class="p-8 font-bold text-slate-400">${new Date(row.date).toLocaleDateString()}</td>
                        <td class="p-8 font-black text-blue-900 uppercase italic">${row.stationName}</td>
                        <td class="p-8 font-bold">${(row.visa||0)}</td>
                        <td class="p-8 font-black text-blue-600">${(row.mada||0)}</td>
                        <td class="p-8 text-red-500 font-bold">-${vat.toFixed(2)}</td>
                        <td class="p-8 font-black text-slate-900">${total.toFixed(2)}</td>
                        <td class="p-8 text-center flex justify-center gap-4">
                            <button onclick="editRow(${index})" class="text-blue-500 hover:scale-110 transition"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteRow('${row.date}', '${row.stationName}')" class="text-red-400 hover:text-red-600 hover:scale-110 transition"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        // Form Submit (Data Entry)
        document.getElementById('dataForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.innerText = "Saving...";
            
            const payload = {
                date: document.getElementById('formDate').value,
                stationName: document.getElementById('formStation').value,
                visa: document.getElementById('formVisa').value,
                mada: document.getElementById('formMada').value,
                action: "add"
            };

            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            closeModal();
            loadData();
            submitBtn.innerText = "Save Data";
            e.target.reset();
        };

        // Delete Function
        async function deleteRow(date, station) {
            if(!confirm("Are you sure you want to delete this?")) return;
            const payload = { date, stationName: station, action: "delete" };
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            loadData();
        }

        // --- Charts, Search, Dark Mode etc (Same as before) ---
        function updateCharts(data) {
            const lastData = data.slice(-7);
            const labels = lastData.map(r => new Date(r.date).toLocaleDateString());
            const sales = lastData.map(r => (parseFloat(r.mada)||0) + (parseFloat(r.visa)||0));
            
            if(salesChart) salesChart.destroy();
            salesChart = new Chart(document.getElementById('salesChart'), {
                type: 'line', 
                data: { labels, datasets: [{ label: 'Daily Sales', data: sales, borderColor: '#2563eb', tension: 0.4 }] }
            });
        }

        function toggleDarkMode() { document.body.classList.toggle('dark'); }
        function searchStation() { /* Search Logic */ }
        window.onload = loadData;
    </script>
</body>
</html>
