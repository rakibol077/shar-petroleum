<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shar Petroleum - Simple Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .admin-only { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 flex min-h-screen">

    <main class="flex-1 p-6 md:p-12 overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-900 uppercase italic tracking-tighter">Shar Petroleum</h1>
                <p id="roleBadge" class="text-[9px] font-bold text-slate-400 uppercase tracking-[3px] mt-1"></p>
            </div>
            <div class="flex space-x-3">
                <button id="addBtn" onclick="openModal()" class="hidden bg-blue-600 text-white px-8 py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg hover:bg-black transition">New Entry</button>
                <button onclick="logout()" class="bg-white border-2 border-slate-100 px-6 py-3 rounded-2xl font-black text-[10px] uppercase text-red-500 hover:bg-red-50 transition">Logout</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Total Sales (Gross)</p>
                <h2 id="totalGross" class="text-2xl font-black text-slate-800 mt-1">0.00 SR</h2>
            </div>
            <div class="admin-only hidden bg-blue-900 p-8 rounded-[40px] shadow-2xl border-none">
                <p class="text-[9px] font-black text-blue-300 uppercase italic tracking-widest">Net Profit (Excl. VAT)</p>
                <h2 id="pureNet" class="text-2xl font-black text-white mt-1">0.00 SR</h2>
            </div>
        </div>

        <div class="bg-white rounded-[45px] shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left text-[11px] border-collapse">
                <thead class="bg-slate-50 text-slate-400 font-black uppercase text-[9px] border-b">
                    <tr>
                        <th class="p-6">Date</th>
                        <th class="p-6 text-emerald-600">Mada</th>
                        <th class="p-6 text-blue-600">Visa</th>
                        <th class="p-6 text-orange-600">Master</th>
                        <th class="p-6 text-red-500 admin-only hidden">VAT (15%)</th>
                        <th class="p-6 font-black text-slate-800">Total Amount</th>
                        <th class="p-6 text-center admin-only hidden">Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-50">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="entryModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[100] p-6">
        <div class="bg-white rounded-[45px] w-full max-w-md p-10 shadow-2xl">
            <h3 class="font-black text-slate-800 uppercase text-xs mb-8 text-center italic tracking-widest border-b pb-4">New Sales Entry</h3>
            <form onsubmit="event.preventDefault(); addData();" class="space-y-4">
                <input type="text" id="sName" value="Shar Petroleum" class="hidden">
                <div class="grid grid-cols-3 gap-3">
                    <div class="flex flex-col">
                        <label class="text-[9px] font-black text-emerald-600 ml-2 mb-1 uppercase">Mada</label>
                        <input type="number" step="0.01" id="sMada" placeholder="0.00" class="p-4 bg-emerald-50 rounded-2xl outline-none font-bold text-center" required>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[9px] font-black text-blue-600 ml-2 mb-1 uppercase">Visa</label>
                        <input type="number" step="0.01" id="sVisa" placeholder="0.00" class="p-4 bg-blue-50 rounded-2xl outline-none font-bold text-center" required>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[9px] font-black text-orange-600 ml-2 mb-1 uppercase">Master</label>
                        <input type="number" step="0.01" id="sMaster" placeholder="0.00" class="p-4 bg-orange-50 rounded-2xl outline-none font-bold text-center" required>
                    </div>
                </div>
                <div class="flex space-x-3 pt-4">
                    <button type="button" onclick="closeModal()" class="w-1/3 bg-slate-100 p-4 rounded-2xl font-black text-[9px] uppercase">Cancel</button>
                    <button type="submit" id="saveBtn" class="w-2/3 bg-blue-600 text-white p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg">Submit Data</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCFX8Ul8xu0CrgiSnRqbBqv1G8hTuo-GhTZqKfB7oe58jhgkXjzE56AGMt_42swBo/exec";
        const role = localStorage.getItem('userRole');

        function checkPermissions() {
            const badge = document.getElementById('roleBadge');
            if (role === 'admin') {
                badge.innerText = "• Administrator Access";
                document.getElementById('addBtn').classList.remove('hidden');
                document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
            } else {
                badge.innerText = "• Staff View Only";
            }
        }

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                renderTable(data);
            } catch (e) { console.error(e); }
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            let gTotal=0, tNet=0;

            data.slice().reverse().forEach(row => {
                const mada = parseFloat(row.mada)||0;
                const visa = parseFloat(row.visa)||0;
                const master = parseFloat(row.master)||0;
                const total = mada + visa + master;
                const vat = total - (total/1.15);
                const net = total/1.15;
                
                gTotal += total; tNet += net;

                let rowHtml = `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-6 font-bold text-slate-400">${new Date(row.date).toLocaleDateString()}</td>
                        <td class="p-6 font-bold text-emerald-600">${mada.toFixed(2)}</td>
                        <td class="p-6 font-bold text-blue-600">${visa.toFixed(2)}</td>
                        <td class="p-6 font-bold text-orange-600">${master.toFixed(2)}</td>`;
                
                if (role === 'admin') {
                    rowHtml += `<td class="p-6 text-red-500 font-bold">${vat.toFixed(2)}</td>`;
                }

                rowHtml += `<td class="p-6 font-black text-slate-800">${total.toFixed(2)} SR</td>`;

                if (role === 'admin') {
                    rowHtml += `<td class="p-6 text-center"><button onclick="deleteRow('${row.id}')" class="text-slate-200 hover:text-red-500"><i class="fas fa-trash-alt"></i></button></td>`;
                }
                
                body.innerHTML += rowHtml + `</tr>`;
            });

            document.getElementById('totalGross').innerText = gTotal.toLocaleString() + " SR";
            if (role === 'admin') {
                document.getElementById('pureNet').innerText = tNet.toLocaleString() + " SR";
            }
        }

        async function addData() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerHTML = "Syncing...";
            const payload = {
                stationName: "Shar Petroleum",
                mada: document.getElementById('sMada').value,
                visa: document.getElementById('sVisa').value,
                master: document.getElementById('sMaster').value
            };
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            closeModal(); loadData();
            btn.disabled = false; btn.innerHTML = "Submit Data";
        }

        function openModal() { document.getElementById('entryModal').classList.replace('hidden', 'flex'); }
        function closeModal() { document.getElementById('entryModal').classList.replace('flex', 'hidden'); }
        function logout() { localStorage.clear(); window.location.href = "index.html"; }

        window.onload = () => {
            if(!role) window.location.href = "index.html";
            checkPermissions();
            loadData();
        };
    </script>
</body>
</html>
