<script>
    // আপনার সঠিক Google Script URL টি এখানে নিশ্চিত করুন
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwUSfER5aUJT_HIzwZdGygH5A_8NRABKVl8vmsL47NLMqBNZjzcTSmci8e9qZq2R4zd/exec";
    const ADMIN_PIN = "4253";
    const GUEST_PIN = "shar321";
    
    let isAdmin = false;
    let cachedData = [];
    let vatChartInstance = null;

    // পেজ লোড হওয়ার সাথে সাথে চেক করা
    window.onload = () => {
        const role = sessionStorage.getItem('shar_role');
        if(role) { 
            isAdmin = (role === 'ADMIN'); 
            unlockApp(isAdmin ? "Administrator" : "Guest"); 
        }
    };

    function handleLogin() {
        const pinField = document.getElementById('userPin');
        const pin = pinField.value;
        const errorMsg = document.getElementById('loginError');

        if(pin === ADMIN_PIN) { 
            isAdmin = true; 
            sessionStorage.setItem('shar_role', 'ADMIN'); 
            unlockApp("Administrator"); 
        } 
        else if(pin === GUEST_PIN) { 
            isAdmin = false; 
            sessionStorage.setItem('shar_role', 'GUEST'); 
            unlockApp("Guest"); 
        } 
        else { 
            errorMsg.classList.remove('hidden'); 
            pinField.value = "";
        }
    }

    function unlockApp(role) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('roleText').innerText = role;
        
        // অ্যাডমিন প্রিভিলেজ সেট করা
        document.querySelectorAll('.admin-only').forEach(el => {
            el.style.display = isAdmin ? 'flex' : 'none';
        });

        loadData(); // অ্যাপ আনলক হওয়ার পর ডাটা লোড শুরু হবে
    }

    // ডাটা লোড করার আধুনিক পদ্ধতি
    async function loadData() {
        try {
            // স্ক্রিনশটে যেমন দেখা যাচ্ছিল "Loading...", সেটি নিশ্চিত করা
            const dashBody = document.getElementById('dashBody');
            if(dashBody) dashBody.innerHTML = "<tr><td colspan='7' class='p-10 text-center'>Loading Database...</td></tr>";

            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            if(data && data.length > 0) {
                handleResponse(data);
            } else {
                if(dashBody) dashBody.innerHTML = "<tr><td colspan='7' class='p-10 text-center text-red-500'>No Data Found!</td></tr>";
            }
        } catch (error) {
            console.error("Error loading data:", error);
            // যদি Fetch কাজ না করে তবে পুরনো JSONP পদ্ধতি ট্রাই করবে
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?callback=handleResponse`;
            document.body.appendChild(script);
        }
    }

    function handleResponse(data) {
        cachedData = data.map((item, index) => ({...item, originalIndex: index})).reverse();
        populateDashboard();
        updateStationList();
        updateShabakaData();
        renderVATChart();
        generateVatReport();
    }

    // বাকি ফাংশনগুলো (populateDashboard, switchTab, etc.) আগের মতোই থাকবে।
</script>
