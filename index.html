<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shar Petroleum - Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">
    <div class="bg-white p-10 rounded-[45px] shadow-2xl w-full max-w-md text-center transform transition hover:scale-105">
        <div class="mb-8">
            <i class="fas fa-gas-pump text-6xl text-blue-600 drop-shadow-lg"></i>
            <h1 class="text-2xl font-black uppercase tracking-widest text-slate-800 mt-4">Shar Petroleum</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Management Cloud Access</p>
        </div>
        
        <div class="space-y-4">
            <input type="password" id="passInput" placeholder="ENTER ACCESS CODE" 
                class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none text-center font-black tracking-[12px] focus:border-blue-500 transition-all text-xl">
            
            <button onclick="checkLogin()" 
                class="w-full bg-blue-600 hover:bg-black text-white p-5 rounded-2xl font-black uppercase shadow-xl shadow-blue-200 transition-all duration-300">
                Verify & Enter
            </button>
        </div>

        <p id="errorMsg" class="text-red-500 text-[10px] mt-6 font-black uppercase hidden italic animate-bounce">
            <i class="fas fa-exclamation-triangle mr-1"></i> Invalid Access Code!
        </p>
    </div>

    <script>
        function checkLogin() {
            const pass = document.getElementById('passInput').value;
            const error = document.getElementById('errorMsg');

            // Admin Pass: 7860 | Staff Pass: 1234
            if (pass === "7860") {
                localStorage.setItem('userRole', 'admin');
                window.location.href = "dashboard.html";
            } else if (pass === "1234") {
                localStorage.setItem('userRole', 'staff');
                window.location.href = "dashboard.html";
            } else {
                error.classList.remove('hidden');
                document.getElementById('passInput').value = "";
            }
        }

        // Enter চাপলে লগইন হবে
        document.getElementById("passInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") checkLogin();
        });
    </script>
</body>
</html>
