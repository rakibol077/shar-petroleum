<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shar Petroleum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; font-family: 'Inter', sans-serif; }
        .oil-drop {
            color: #3b82f6;
            animation: pulse-drop 2s infinite;
            display: inline-block;
        }
        @keyframes pulse-drop {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px #3b82f6); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 15px #3b82f6); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px #3b82f6); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 1);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-6">

    <div class="glass-card p-10 w-full max-w-md border border-gray-100">
        <div class="text-center mb-10">
            <div class="mb-4">
                <i class="fas fa-droplet text-6xl oil-drop"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Shar Petroleum</h2>
            <p class="text-gray-400 text-[10px] uppercase font-bold tracking-[0.2em] mt-1 text-center">Cloud Management System</p>
        </div>
        
        <form id="loginForm" class="space-y-4">
            <div class="relative">
                <i class="fas fa-user-shield absolute left-4 top-4 text-gray-300 text-sm"></i>
                <input type="email" id="email" placeholder="Email Address" 
                       class="w-full pl-12 pr-4 py-4 border border-gray-100 rounded-2xl bg-gray-50 outline-none text-sm focus:ring-2 ring-blue-100 transition-all" required>
            </div>
            
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-4 text-gray-300 text-sm"></i>
                <input type="password" id="password" placeholder="Password" 
                       class="w-full pl-12 pr-4 py-4 border border-gray-100 rounded-2xl bg-gray-50 outline-none text-sm focus:ring-2 ring-blue-100 transition-all" required>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-black text-white font-black py-4 rounded-2xl shadow-xl transition-all uppercase text-[10px] tracking-widest mt-6">
                Login Dashboard <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </form>

        <p id="errorMsg" class="text-center text-red-500 text-[11px] mt-6 font-bold hidden uppercase italic tracking-wider"></p>
        
        <div class="mt-8 pt-6 border-t border-gray-50 text-center">
            <p class="text-[9px] text-gray-300 font-bold uppercase tracking-widest">&copy; 2026 Shar Petroleum Admin</p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            // --- লগইন ক্রেডেনশিয়াল ---
            
            // ১. এডমিন (আপনি - ফুল কন্ট্রোল)
            if (email === "admin@shar.com" && pass === "shar786") {
                localStorage.setItem('userRole', 'admin');
                window.location.href = "dashboard.html";
            } 
            // ২. স্টাফ (অন্যান্য ব্যক্তি - শুধু দেখার জন্য)
            else if (email === "staff@shar.com" && pass === "staff123") {
                localStorage.setItem('userRole', 'staff');
                window.location.href = "dashboard.html";
            } 
            else {
                errorMsg.innerText = "Access Denied: Invalid Credentials!";
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 3000);
            }
        };

        // অটোমেটিক সেশন ক্লিয়ার (যদি আগের কোনো লগইন থাকে)
        window.onload = () => {
            localStorage.removeItem('userRole');
        };
    </script>
</body>
</html>
