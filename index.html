<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="tYRoNQvLp54jEN1bM-BMcLFICqdUtTk33YerX2im1zA" />
    
    <title>Shar Petroleum - Management System</title>
    <meta name="description" content="Official management system for Shar Petroleum. Track daily sales and reports.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .sidebar-link { cursor: pointer; transition: 0.3s; padding: 12px; border-radius: 12px; display: flex; align-items: center; color: #64748b; font-weight: 600; }
        .sidebar-link:hover, .sidebar-link.active { background: #eff6ff; color: #2563eb; }
        .page { display: none; }
        .page.active { display: block; }
        .stat-card { border-radius: 24px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="loginOverlay" class="fixed inset-0 bg-[#0f172a] z-[3000] flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-[380px] text-center">
            <h1 class="text-2xl font-black text-slate-800 italic mb-8 uppercase tracking-widest text-blue-600">Shar Petroleum</h1>
            <input type="password" id="userPin" placeholder="••••" class="w-full p-5 bg-slate-100 rounded-2xl text-center text-3xl font-bold mb-6 outline-none border-2 focus:border-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-blue-700 uppercase tracking-widest">Login</button>
        </div>
    </div>

    <div id="mainApp" class="hidden flex h-screen overflow-hidden">
        <aside class="w-72 bg-white border-r flex flex-col p-6 shrink-0">
            <h2 class="font-black text-blue-600 italic text-xl uppercase mb-10">Shar Petroleum</h2>
            <nav class="flex-1 space-y-2">
                <div onclick="switchPage('dashboard', this)" class="sidebar-link active"><i class="fas fa-th-large w-6"></i> Dashboard</div>
                <div onclick="switchPage('entry', this)" class="sidebar-link"><i class="fas fa-plus-circle w-6"></i> Data Entry</div>
                <div onclick="switchPage('tax', this)" class="sidebar-link"><i class="fas fa-file-invoice w-6"></i> Tax Invoice</div>
                <div onclick="switchPage('vat', this)" class="sidebar-link"><i class="fas fa-receipt w-6"></i> VAT Report</div>
            </nav>
            <button onclick="location.reload()" class="text-red-500 font-bold p-4 hover:bg-red-50 rounded-2xl text-left mt-auto"><i class="fas fa-sign-out-alt mr-2"></i> Logout</button>
        </aside>

        <main class="flex-1 overflow-auto p-10">
            <div id="dashboard" class="page active">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div class="stat-card bg-blue-600 text-white shadow-xl">
                        <p class="text-[10px] font-bold uppercase opacity-80 mb-1">Total Gross</p>
                        <h3 id="totalGross" class="text-3xl font-black">Loading...</h3>
                    </div>
                    <div class="stat-card bg-white border-b-8 border-red-500 shadow-sm">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Bank Fees (1.1%)</p>
                        <h3 id="totalFees" class="text-3xl font-black text-red-500">0.00 SR</h3>
                    </div>
                    <div class="stat-card bg-white border-b-8 border-green-500 shadow-sm">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Net Income</p>
                        <h3 id="netIncome" class="text-3xl font-black text-green-600">0.00 SR</h3>
                    </div>
                </div>

                <div class="bg-white rounded-[35px] border overflow-hidden shadow-sm">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <tr>
                                <th class="p-6">Date</th>
                                <th class="p-6">Station</th>
                                <th class="p-6 text-blue-600">Mada</th>
                                <th class="p-6 text-red-500">Visa</th>
                                <th class="p-6">Net Total</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="text-sm font-bold text-slate-700">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="entry" class="page py-20 text-center font-black text-slate-300 uppercase italic">Data Entry Screen</div>
            <div id="tax" class="page py-20 text-center font-black text-slate-300 uppercase italic">Tax Invoice Generator</div>
            <div id="vat" class="page py-20 text-center font-black text-slate-300 uppercase italic">VAT Summary Report</div>
        </main>
    </div>

    <script>
        // আপনার গুগল অ্যাপস স্ক্রিপ্টের URL এখানে দিন
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfyc... আপনার লিঙ্ক .../exec";

        function handleLogin() {
            const pin = document.getElementById('userPin').value;
            if (pin === '4253' || pin === 'shar321') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                fetchData();
            } else { alert("Wrong PIN!"); }
        }

        function switchPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
        }

        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                renderTable(data);
            } catch (e) { 
                console.log(e); 
                document.getElementById('totalGross').innerText = "Error Loading";
            }
        }

        function renderTable(data) {
            let html = ""; let total = 0;
            for (let i = 1; i < data.length; i++) {
                let m = parseFloat(data[i][2]) || 0;
                let v = parseFloat(data[i][3]) || 0;
                let net = m + v;
                total += net;
                html += `<tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-6 text-slate-400 font-medium">${data[i][0]}</td>
                    <td class="p-6 font-black uppercase text-slate-800">${data[i][1]}</td>
                    <td class="p-6 text-blue-600">${m.toFixed(2)}</td>
                    <td class="p-6 text-red-500">${v.toFixed(2)}</td>
                    <td class="p-6 font-black text-slate-900">${net.toFixed(2)} SR</td>
                </tr>`;
            }
            document.getElementById('tableBody').innerHTML = html;
            document.getElementById('totalGross').innerText = total.toFixed(2) + " SR";
            document.getElementById('totalFees').innerText = (total * 0.011).toFixed(2) + " SR";
            document.getElementById('netIncome').innerText = (total * 0.989).toFixed(2) + " SR";
        }
    </script>
</body>
</html>
