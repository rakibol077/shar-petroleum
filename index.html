<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="tYRoNQvLp54jEN1bM-BMcLFICqdUtTk33YerX2im1zA" />
    <title>Shar Petroleum - Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .sidebar-link { cursor: pointer; display: flex; align-items: center; padding: 12px 20px; color: #64748b; font-weight: 600; transition: 0.3s; margin-bottom: 4px; border-radius: 12px; }
        .sidebar-link.active { background: #eff6ff; color: #2563eb; }
        .stat-card { background: white; padding: 24px; border-radius: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

    <div id="loginOverlay" class="fixed inset-0 bg-[#0f172a] z-[2000] flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-[380px] text-center">
            <h1 class="text-2xl font-black text-slate-800 italic mb-8 uppercase tracking-widest text-blue-600">Shar Petroleum</h1>
            <input type="password" id="userPin" placeholder="••••" class="w-full p-5 bg-slate-100 rounded-2xl text-center text-3xl font-bold mb-6 outline-none border-2 focus:border-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all uppercase tracking-wider">Login</button>
        </div>
    </div>

    <div id="mainApp" class="hidden flex h-screen">
        <aside class="w-64 bg-white border-r p-6 flex flex-col shrink-0">
            <div class="text-blue-600 font-black italic text-xl mb-10 uppercase">Shar Petroleum</div>
            <nav class="flex-1 space-y-1">
                <div class="sidebar-link active"><i class="fas fa-th-large mr-3"></i> Dashboard</div>
                <div class="sidebar-link"><i class="fas fa-plus-circle mr-3"></i> Data Entry</div>
                <div class="sidebar-link"><i class="fas fa-file-invoice mr-3"></i> Tax Invoice</div>
                <div class="sidebar-link"><i class="fas fa-receipt mr-3"></i> VAT Report</div>
            </nav>
            <div class="mt-auto p-4 bg-slate-50 rounded-2xl text-[10px] text-slate-400 font-bold uppercase text-center">
                System Verified by Google
            </div>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black text-slate-800 italic uppercase">Daily Sales Overview</h2>
                <div id="statusTag" class="px-4 py-2 bg-green-100 text-green-600 rounded-full text-xs font-bold uppercase tracking-widest">Live Data</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="stat-card bg-blue-600 text-white border-b-8 border-blue-800">
                    <p class="text-xs font-bold uppercase opacity-80 mb-1">Total Gross Sales</p>
                    <h3 id="totalGross" class="text-3xl font-black italic">Loading...</h3>
                </div>
                <div class="stat-card border-b-8 border-red-500">
                    <p class="text-xs font-bold text-slate-400 uppercase mb-1">Bank Fees (1.1%)</p>
                    <h3 id="totalFees" class="text-3xl font-black text-red-500 italic">0.00 SR</h3>
                </div>
                <div class="stat-card border-b-8 border-green-500">
                    <p class="text-xs font-bold text-slate-400 uppercase mb-1">Net Income</p>
                    <h3 id="netIncome" class="text-3xl font-black text-green-600 italic">0.00 SR</h3>
                </div>
            </div>

            <div class="bg-white rounded-[32px] shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[11px] font-black text-slate-400 uppercase tracking-tighter">
                        <tr>
                            <th class="p-5">Date</th>
                            <th class="p-5">Station Name</th>
                            <th class="p-5 text-blue-600">Mada</th>
                            <th class="p-5 text-red-500">Visa</th>
                            <th class="p-5">Net Total</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm font-bold text-slate-700">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // আপনার দেওয়া গুগল স্ক্রিপ্ট লিঙ্কটি এখানে বসানো হয়েছে
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMyOrtaSY90KJinaGjlQBMdaHHxrMiHawAVW80xPA3dHHcsyOkqjP4rthe0KaEPVrU/exec";

        function handleLogin() {
            const pin = document.getElementById('userPin').value;
            if (pin === '4253' || pin === 'shar321') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                fetchData();
            } else { 
                alert("ভুল পিন কোড! দয়া করে সঠিক পিন দিন।"); 
            }
        }

        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                renderTable(data);
            } catch (e) {
                document.getElementById('totalGross').innerText = "Error Loading";
                console.error("Data fetch error:", e);
            }
        }

        function renderTable(data) {
            let html = ""; 
            let total = 0;
            
            // data[0] তে হেডার থাকে, তাই i=1 থেকে শুরু
            for (let i = 1; i < data.length; i++) {
                let mada = parseFloat(data[i][2]) || 0;
                let visa = parseFloat(data[i][3]) || 0;
                let rowTotal = mada + visa;
                total += rowTotal;

                html += `<tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-5 text-slate-400 font-medium">${data[i][0]}</td>
                    <td class="p-5 font-black uppercase text-slate-800">${data[i][1]}</td>
                    <td class="p-5 text-blue-600">${mada.toFixed(2)}</td>
                    <td class="p-5 text-red-500">${visa.toFixed(2)}</td>
                    <td class="p-5 font-black text-slate-900">${rowTotal.toFixed(2)} SR</td>
                </tr>`;
            }

            document.getElementById('tableBody').innerHTML = html;
            document.getElementById('totalGross').innerText = total.toFixed(2) + " SR";
            document.getElementById('totalFees').innerText = (total * 0.011).toFixed(2) + " SR";
            document.getElementById('netIncome').innerText = (total * 0.989).toFixed(2) + " SR";
        }
    </script>
</body>
</html>
