
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shar Petroleum</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f5f5f5}
header{background:#0f172a;color:white;padding:20px;text-align:center}
nav{background:#1e293b;padding:10px;text-align:center}
nav a{color:white;margin:0 10px;text-decoration:none;font-weight:bold}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px}
input,textarea,select{width:100%;padding:10px;margin-top:5px;margin-bottom:10px}
button{background:#2563eb;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer}
footer{background:#0f172a;color:white;text-align:center;padding:15px;margin-top:30px}
</style>
</head>

<body>

<header>
<h1>Shar Petroleum</h1>
<p>Sakaka & Dumat Al‑Jandal Service Portal</p>
</header>

<nav>
<a href="#stations">Stations</a>
<a href="#complaint">Complaint</a>
<a href="#suggestion">Suggestion</a>
<a href="#map">Location Map</a>
</nav>

<div class="container">

<div class="card" id="stations">
<h2>Stations</h2>
<p>Main service areas:</p>
<ul>
<li>Sakaka – Al Jouf</li>
<li>Dumat Al‑Jandal – Al Jouf</li>
</ul>
</div>

<div class="card" id="complaint">
<h2>Submit Complaint</h2>
<form>
<label>Name</label>
<input type="text">

<label>City</label>
<select>
<option>Sakaka</option>
<option>Dumat Al‑Jandal</option>
</select>

<label>Message</label>
<textarea rows="4"></textarea>

<button type="submit">Submit Complaint</button>
</form>
</div>

<div class="card" id="suggestion">
<h2>Send Suggestion</h2>
<form>
<label>Name</label>
<input type="text">

<label>Suggestion</label>
<textarea rows="4"></textarea>

<button type="submit">Send Suggestion</button>
</form>
</div>

<div class="card" id="map">
<h2>Google Map</h2>
<iframe width="100%" height="350" style="border:0" loading="lazy" allowfullscreen
src="https://www.google.com/maps?q=Sakaka%20Al%20Jouf&output=embed"></iframe>
</div>

</div>

<footer>
© 2026 Shar Petroleum
</footer>

</body>
</html>
