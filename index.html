<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shar Petroleum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .oil-drop {
            color: #3b82f6; /* Blue Color */
            animation: drop-pulse 2s infinite;
        }
        @keyframes drop-pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen p-4">
    <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <div class="mb-4">
                <i class="fas fa-droplet text-5xl oil-drop"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Shar Petroleum</h2>
            <p class="text-gray-400 text-[10px] uppercase font-bold tracking-widest mt-1">Management Cloud Login</p>
        </div>
        
        <form id="loginForm" class="space-y-4">
            <div class="relative">
                <i class="fas fa-envelope absolute left-4 top-4 text-gray-300"></i>
                <input type="email" id="email" placeholder="Email Address" class="w-full pl-12 pr-4 py-4 border rounded-2xl bg-gray-50 outline-none text-sm focus:ring-2 ring-blue-100 transition" required>
            </div>
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-4 text-gray-300"></i>
                <input type="password" id="password" placeholder="Password" class="w-full pl-12 pr-4 py-4 border rounded-2xl bg-gray-50 outline-none text-sm focus:ring-2 ring-blue-100 transition" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-black transition-all uppercase text-[10px] tracking-widest mt-4">
                Secure Login <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </form>
        <p id="msg" class="text-center text-red-500 text-xs mt-4 font-bold"></p>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            // Admin: admin@shar.com | Pass: shar786
            // Staff: staff@shar.com | Pass: staff123
            if (email === "admin@shar.com" && pass === "shar786") {
                localStorage.setItem('userRole', 'admin');
                window.location.href = "dashboard.html";
            } 
            else if (email === "staff@shar.com" && pass === "staff123") {
                localStorage.setItem('userRole', 'viewer');
                window.location.href = "dashboard.html";
            } 
            else {
                msg.innerText = "Invalid credentials! Please try again.";
            }
        };
    </script>
</body>
</html>
