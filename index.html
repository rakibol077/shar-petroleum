<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shar Petroleum - Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; }
        #loginOverlay { position: fixed; inset: 0; background: #0f172a; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        #mainApp { display: none; height: 100vh; background-color: #f8fafc; }
        .sidebar { background: #ffffff; width: 260px; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .nav-link { display: flex; align-items: center; padding: 12px 24px; color: #64748b; font-size: 13px; font-weight: 600; cursor: pointer; border-right: 4px solid transparent; }
        .nav-link:hover, .nav-link-active { background: #f1f5f9; color: #2563eb; border-right-color: #2563eb; }
        .content-area { flex: 1; overflow-y: auto; padding: 32px; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        @media print { .sidebar, .print-hidden { display: none !important; } #mainApp { display: block !important; } }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="bg-white p-10 rounded-[32px] shadow-2xl w-full max-w-sm text-center">
            <h1 class="text-2xl font-black text-slate-800 italic mb-8 uppercase">Shar Petroleum</h1>
            <input type="password" id="userPin" placeholder="ENTER ACCESS PIN" class="w-full p-4 bg-slate-50 border rounded-2xl text-center text-xl font-bold mb-4 outline-none focus:border-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all">VERIFY & ENTER</button>
            <p id="loginError" class="text-red-500 text-[10px] mt-4 font-bold hidden uppercase">Invalid PIN!</p>
        </div>
    </div>

    <div id="mainApp">
        <aside class="sidebar print-hidden">
            <div class="p-8"><h2 class="text-xl font-black text-blue-600 italic uppercase">Shar Petroleum</h2></div>
            <nav class="flex-1">
                <div onclick="switchTab('dashboard')" class="nav-link nav-link-active" id="nav-dashboard"><i class="fas fa-chart-pie mr-3"></i> Dashboard</div>
                <div onclick="switchTab('taxInvoice')" class="nav-link" id="nav-taxInvoice"><i class="fas fa-file-invoice-dollar mr-3"></i> Tax Invoice</div>
                <div onclick="switchTab('vatReport')" class="nav-link" id="nav-vatReport"><i class="fas fa-file-alt mr-3"></i> VAT Report</div>
            </nav>
            <div class="p-6 border-t"><button onclick="location.reload()" class="text-red-500 text-xs font-bold uppercase"><i class="fas fa-sign-out-alt mr-2"></i> Logout</button></div>
        </aside>

        <main class="content-area">
            <header class="flex justify-between items-center mb-8 print-hidden">
                <div>
                    <h1 class="text-2xl font-black text-slate-800 italic uppercase">Welcome, Shar Petroleum</h1>
                    <p class="text-[10px] text-blue-500 font-bold uppercase tracking-wider">Access Level: Administrator</p>
                </div>
                <button onclick="window.print()" class="bg-slate-800 text-white px-5 py-2 rounded-xl text-[10px] font-bold uppercase">Print Screen</button>
            </header>

            <div id="dashboard" class="view-section active">
                <div class="bg-white p-6 rounded-2xl shadow-sm border text-center">
                    <h2 class="text-slate-400 text-xs font-bold uppercase mb-2">Database Status</h2>
                    <div id="dataStatus" class="text-blue-600 font-black text-xl italic">Waiting for Login...</div>
                </div>
            </div>

            </main>
    </div>

    <script>
        // আপনার Google App Script URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwUSfER5aUJT_HIzwZdGygH5A_8NRABKVl8vmsL47NLMqBNZjzcTSmci8e9qZq2R4zd/exec";
        const CORRECT_PIN = "4253";

        function handleLogin() {
            const pinValue = document.getElementById('userPin').value;
            const errorMsg = document.getElementById('loginError');

            if (pinValue === CORRECT_PIN) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
                fetchData();
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('userPin').value = "";
            }
        }

        async function fetchData() {
            const statusDiv = document.getElementById('dataStatus');
            statusDiv.innerText = "Loading Data...";

            try {
                // সরাসরি Fetch কল করা
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                if (data) {
                    statusDiv.innerHTML = "<span class='text-green-500'>Data Loaded Successfully!</span>";
                    console.log("Data:", data);
                    // এখানে আপনার টেবিল পপুলেট করার ফাংশনটি কল করবেন
                }
            } catch (error) {
                console.error("Fetch error:", error);
                statusDiv.innerHTML = "<span class='text-red-500'>Connection Error! Please check Google Script.</span>";
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('nav-link-active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('nav-link-active');
        }
    </script>
</body>
</html>
