<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shar Petroleum - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-sm text-center">
        <h2 class="text-2xl font-bold">Shar Petroleum</h2>
        <form onsubmit="event.preventDefault(); auth()">
            <input type="email" id="e" class="w-full p-3 border mt-4" value="rakibol077@gmail.com" readonly>
            <input type="password" id="p" class="w-full p-3 border mt-4" placeholder="adminshar" required>
            <button class="w-full bg-blue-500 text-white p-3 mt-6">LOGIN</button>
        </form>
    </div>
    <script>
        function auth() {
            if(document.getElementById('p').value === "adminshar") {
                window.location.href = "dashboard.html";
            } else { alert("Wrong Password!"); }
        }
    </script>
</body>
</html>
