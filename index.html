<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shar Petroleum - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-xl shadow-2xl overflow-hidden flex flex-col md:flex-row max-w-4xl w-full border border-gray-100">
        <div class="md:w-1/2 bg-blue-50 flex items-center justify-center p-6">
            <img src="https://img.freepik.com/free-vector/gas-station-concept-illustration_114360-10118.jpg" alt="Gas Station" class="max-w-full h-auto rounded-lg">
        </div>
        <div class="md:w-1/2 p-8 md:p-12 flex flex-col justify-center text-center">
            <img src="https://arpetrolna.comtechsolutionbd.com/assets/images/logo.png" alt="Logo" class="w-20 mx-auto mb-3">
            <h2 class="text-2xl font-black text-[#00adef] italic uppercase mb-8">Shar Petroleum</h2>
            <form onsubmit="event.preventDefault(); handleLogin();">
                <div class="text-left mb-5">
                    <label class="block text-xs font-bold text-gray-400 mb-1 uppercase">User ID</label>
                    <input type="email" id="email" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#00adef] outline-none" placeholder="Enter User ID" required>
                </div>
                <div class="text-left mb-8">
                    <label class="block text-xs font-bold text-gray-400 mb-1 uppercase">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#00adef] outline-none" placeholder="Enter Password" required>
                </div>
                <button type="submit" class="w-full bg-[#00adef] hover:bg-[#008cc2] text-white font-bold py-3 rounded-lg shadow-lg transition-all">LOGIN</button>
            </form>
        </div>
    </div>
    <script>
        function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(email === "rakibol077@gmail.com" && pass === "adminshar") {
                localStorage.setItem('userRole', 'admin');
                window.location.href = "dashboard.html";
            } else if (pass === "12345") { // সাধারণ ইউজারদের জন্য
                localStorage.setItem('userRole', 'viewer');
                window.location.href = "dashboard.html";
            } else {
                alert("Incorrect Email or Password!");
            }
        }
    </script>
</body>
</html>
