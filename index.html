<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="tYRoNQvLp54jEN1bM-BMcLFICqdUtTk33YerX2im1zA" />
    <title>Shar Petroleum - Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .sidebar-link { cursor: pointer; display: flex; align-items: center; padding: 12px 20px; color: #64748b; font-weight: 600; transition: 0.3s; margin-bottom: 5px; border-radius: 10px; }
        .sidebar-link:hover, .sidebar-link.active { background: #eff6ff; color: #2563eb; border-right: 4px solid #2563eb; }
        .stat-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: 0.3s; }
        .stat-card:hover { transform: translateY(-3px); }
        .table-container { background: white; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; }
    </style>
</head>
<body class="bg-[#f4f7fe]">

    <div id="loginOverlay" class="fixed inset-0 bg-[#0f172a] z-[2000] flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-[380px] text-center">
            <h1 class="text-2xl font-black text-blue-600 italic mb-2 uppercase tracking-tighter">SHAR PETROLEUM</h1>
            <p class="text-slate-400 text-xs font-bold mb-8 uppercase tracking-widest">Administrator</p>
            <input type="password" id="userPin" placeholder="••••" class="w-full p-5 bg-slate-100 rounded-2xl text-center text-3xl font-bold mb-6 outline-none border-2 focus:border-blue-500 transition-all">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all uppercase tracking-widest">Login</button>
        </div>
    </div>

    <div id="mainApp" class="hidden flex h-screen">
        <aside class="w-72 bg-white border-r p-8 flex flex-col shrink-0">
            <div class="text-blue-600 font-black italic text-2xl mb-12 uppercase tracking-tighter">SHAR PETROLEUM</div>
            <nav class="flex-1 space-y-1">
                <div class="sidebar-link active"><i class="fas fa-th-large mr-4"></i> Dashboard</div>
                <div class="sidebar-link"><i class="fas fa-edit mr-4"></i> Master Data Entry</div>
                <div class="sidebar-link"><i class="fas fa-file-invoice mr-4"></i> Tax Invoice</div>
                <div class="sidebar-link"><i class="fas fa-chart-line mr-4"></i> TDS Summary</div>
                <div class="sidebar-link"><i class="fas fa-database mr-4"></i> Shabaka Data</div>
                <div class="sidebar-link"><i class="fas fa-receipt mr-4"></i> VAT Report</div>
            </nav>
            <button onclick="location.reload()" class="mt-auto text-red-500 font-bold flex items-center p-4 hover:bg-red-50 rounded-xl transition">
                <i class="fas fa-sign-out-alt mr-3"></i> LOGOUT
            </button>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-3xl font-black text-slate-800 uppercase italic">Welcome, Shar Petroleum</h2>
                    <p class="text-blue-500 font-bold text-xs uppercase tracking-widest mt-1">Administrator</p>
                </div>
                <button class="bg-[#1e293b] text-white px-6 py-3 rounded-xl font-bold text-xs uppercase shadow-lg flex items-center">
                    <i class="fas fa-print mr-2"></i> Print Screen
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                <div class="stat-card bg-blue-600 text-white">
                    <p class="text-[10px] font-bold uppercase opacity-70 mb-2 tracking-widest">Total Gross</p>
                    <h3 id="totalGross" class="text-4xl font-black italic tracking-tighter">Loading...</h3>
                </div>
                <div class="stat-card">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest">Bank Fees (1.1%)</p>
                    <h3 id="totalFees" class="text-4xl font-black text-red-500 italic tracking-tighter">0.00 SR</h3>
                </div>
                <div class="stat-card">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest">Net Income</p>
                    <h3 id="netIncome" class="text-4xl font-black text-green-500 italic tracking-tighter">0.00 SR</h3>
                </div>
            </div>

            <div class="table-container">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        <tr>
                            <th class="p-6">Date</th>
                            <th class="p-6 text-slate-800">Station</th>
                            <th class="p-6 text-blue-600">Mada</th>
                            <th class="p-6 text-red-400">Visa</th>
                            <th class="p-6 text-amber-500">Master</th>
                            <th class="p-6 text-slate-800">Net Total</th>
                            <th class="p-6 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm font-bold text-slate-600">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMyOrtaSY90KJinaGjlQBMdaHHxrMiHawAVW80xPA3dHHcsyOkqjP4rthe0KaEPVrU/exec";

        function handleLogin() {
            const pin = document.getElementById('userPin').value;
            if (pin === '4253' || pin === 'shar321') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                fetchData();
            } else { alert("Wrong PIN!"); }
        }

        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                renderTable(data);
            } catch (e) {
                document.getElementById('totalGross').innerText = "Error!";
            }
        }

        function renderTable(data) {
            let html = ""; let total = 0;
            for (let i = 1; i < data.length; i++) {
                let mada = parseFloat(data[i][2]) || 0;
                let visa = parseFloat(data[i][3]) || 0;
                let master = parseFloat(data[i][4]) || 0;
                let rowTotal = mada + visa + master;
                total += rowTotal;

                html += `<tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-6 italic text-slate-400">${data[i][0]}</td>
                    <td class="p-6 font-black uppercase text-slate-800">${data[i][1]}</td>
                    <td class="p-6 text-blue-600 font-extrabold">${mada.toFixed(2)}</td>
                    <td class="p-6 text-red-400">${visa.toFixed(2)}</td>
                    <td class="p-6 text-amber-500">${master.toFixed(2)}</td>
                    <td class="p-6 font-black text-slate-900">${rowTotal.toFixed(2)} SR</td>
                    <td class="p-6 text-center space-x-3">
                        <button class="text-blue-500 hover:text-blue-700"><i class="fas fa-edit"></i></button>
                        <button class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            }
            document.getElementById('tableBody').innerHTML = html;
            document.getElementById('totalGross').innerText = total.toFixed(2) + " SR";
            document.getElementById('totalFees').innerText = (total * 0.011).toFixed(2) + " SR";
            document.getElementById('netIncome').innerText = (total * 0.989).toFixed(2) + " SR";
        }
    </script>
</body>
</html>
